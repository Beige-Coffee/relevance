:[14,41,42],"associatedConcepts":["rationality","self-deception"],"keyClaimsAbout":["Rationality is distinct from intelligence and requires its own developmental cultivation.","Rationality depends on a cognitive style trained to avoid bias.","Hallmark of rationality is attending to the processes of cognition, not just the products."],"notes":"Stanovich is Vervaeke's primary empirical reference in the rationality chapters."},{"id":"la-paul","canonicalName":"L.A. Paul","aliases":["Laurie Paul"],"shortBio":"American philosopher (b. 1966), professor at Yale, best known for her work on transformative experience.","roleInArgument":"L.A. Paul gives Vervaeke the philosophical analysis of transformative experience, experiences that change both who you are and what you know about being that way, leaving you radically ignorant before and irreversibly changed after, central to Vervaeke's accounts of aspiration, gnosis, and higher states of consciousness.","introducedIn":1,"discussedIn":[1,10,17,24,25,42,44],"associatedConcepts":["transformative-experience","aspiration","existential-entrapment"],"keyClaimsAbout":["Transformative experiences change both personal preferences and epistemic access.","You cannot rationally choose to undergo a transformative experience using current values.","Becoming a vampire / having a child are paradigm cases.","Existential ignorance: we don't know what we will lose or what we will miss."],"notes":"Paul's 'Transformative Experience' (2014) is one of Vervaeke's most-cited recent philosophical works."},{"id":"leo-ferraro","canonicalName":"Leo Ferraro","aliases":[],"shortBio":"Cognitive scientist and frequent collaborator with John Vervaeke on flow, mindfulness, parasitic processing, and wisdom.","roleInArgument":"Ferraro co-authored with Vervaeke key papers on flow (2013), mindfulness (2016), parasitic processing, and wisdom, supplying the technical scaffolding for several of Vervaeke's core constructs.","introducedIn":2,"discussedIn":[2,8,11,13,14,30,32,40,45],"associatedConcepts":["flow","mindfulness","parasitic-processing","relevance-realization","wisdom"],"keyClaimsAbout":["Co-author with Vervaeke on the cognitive science of flow (2013) and mindfulness (2016).","Co-developer of the parasitic processing model.","Originator of the phrase 'confirmation porn' (per Vervaeke's attribution)."],"notes":"Ferraro is one of Vervaeke's three or four most cited collaborators throughout the series."},{"id":"feuerbach","canonicalName":"Ludwig Feuerbach","aliases":[],"shortBio":"German philosopher (1804-1872), author of The Essence of Christianity, critic of religion as projection.","roleInArgument":"Feuerbach's critique of religion as projection, that God is the projection of our humanity, is what Marx then radicalizes into the political critique. Vervaeke uses Feuerbach to articulate one extreme alternative to his own naturalistic account of sacredness.","introducedIn":24,"discussedIn":[24],"associatedConcepts":["nihilism","narrative-order"],"keyClaimsAbout":["Religion is the projection of our own humanity onto a supernatural figure.","Religion alienates us from our own role in shaping history.","Marx develops Feuerbach into political-economic critique."],"notes":"Cited in the Hegel-Marx chapter (ep. 24)."},{"id":"ludwig-wittgenstein","canonicalName":"Ludwig Wittgenstein","aliases":["Wittgenstein"],"shortBio":"Austrian-British philosopher (1889–1951) whose later work (Philosophical Investigations) reframed meaning as use-in-life-forms.","roleInArgument":"Wittgenstein's family-resemblance account of concepts and his treatment of meaning as participatory practice supports Vervaeke's move away from definitional/propositional accounts of meaning.","introducedIn":26,"discussedIn":[26,27,41,45,47],"associatedConcepts":["participatory-knowing","propositional-knowing","the-frame-problem"],"keyClaimsAbout":["Concepts have family-resemblance structure, not necessary-and-sufficient-conditions structure.","Meaning is constituted by use within a form of life, participatory, not propositional."],"notes":null},{"id":"marc-lewis","canonicalName":"Marc Lewis","aliases":[],"shortBio":"Canadian developmental neuroscientist (b. 1951), author of Memoirs of an Addicted Brain and The Biology of Desire.","roleInArgument":"Marc Lewis gives Vervaeke the model of addiction as reciprocal narrowing, the interactive shrinking of agency and arena, which becomes part of the dual diagnosis of dukkha together with parasitic processing. Lewis's friendship and direct engagement with Vervaeke shape this account.","introducedIn":13,"discussedIn":[13,19,30,36],"associatedConcepts":["reciprocal-narrowing","dukkha","parasitic-processing"],"keyClaimsAbout":["Addiction is reciprocal narrowing, agent and arena tightly co-restrict each other.","The standard chemical-compulsion model of addiction is fundamentally wrong.","Addiction is a form of existential learning, a learned loss of agency."],"notes":"Vervaeke and Lewis collaborate on the dual account: parasitic processing (within) plus reciprocal narrowing (without) jointly constitute dukkha."},{"id":"marcus-aurelius","canonicalName":"Marcus Aurelius","aliases":[],"shortBio":"Roman emperor (121-180 CE) and Stoic philosopher, author of the Meditations.","roleInArgument":"Marcus Aurelius represents Stoicism's mature integration, Vervaeke uses him for the line 'It is possible to be happy even in a palace' to capture the Stoic insight that one can be in the having-mode existential trap regardless of external circumstance.","introducedIn":7,"discussedIn":[7,14,15],"associatedConcepts":["having-mode-being-mode"],"keyClaimsAbout":["Stoicism's mature integration of Socratic philosophy with imperial responsibility.","It is possible to be happy even in a palace, circumstance does not determine meaning.","Father of cognitive behavioral therapy via Beck and Stoic transmission."],"notes":"Recurs throughout the Stoic and Hellenistic episodes."},{"id":"buber","canonicalName":"Martin Buber","aliases":[],"shortBio":"Austrian-Israeli Jewish philosopher (1878-1965), author of I and Thou.","roleInArgument":"Buber gives Vervaeke the I-thou versus I-it distinction, the relational modes in which we encounter persons (participatory, transforming) versus things (categorical, manipulable). Used to articulate the participatory dimension of agape and the loss thereof in modal confusion.","introducedIn":7,"discussedIn":[7,8],"associatedConcepts":["having-mode-being-mode","agape","participatory-knowing"],"keyClaimsAbout":["I-it relations categorize and instrumentalize; I-thou relations participate and transform.","Persons are encountered in I-thou, objects in I-it, but moderns reduce I-thou to I-it.","Buber anticipates Fromm's distinction of being-mode and having-mode."],"notes":"Vervaeke uses I-thou as a quick shorthand for the participatory, transformative mode."},{"id":"heidegger","canonicalName":"Martin Heidegger","aliases":["Heidegger"],"shortBio":"German philosopher (1889-1976), author of Being and Time, foundational figure of continental philosophy and 20th-century phenomenology.","roleInArgument":"Heidegger is the godfather of Vervaeke's preferred line of response to the meaning crisis. His notions of Dasein (transjective being-in-the-world), care, the forgetfulness of being, aletheia (truth as disclosure), and the analysis of throwness shape Vervaeke's reading of relevance realization, the transjective, and participatory knowing. Vervaeke has explicit ambivalence about Heidegger but treats him as central.","introducedIn":1,"discussedIn":[1,14,17,27,30,31,33,46,47,48,49,50],"associatedConcepts":["transjective-relations","participatory-knowing","relevance-realization","4e-cognition","the-prophets-of-the-meaning-crisis"],"keyClaimsAbout":["Heidegger's Dasein is inherently transjective, being-in-the-world is not subject-object but co-constitutive.","Care is at the core of being and at the core of finding things relevant.","The meaning crisis is the forgetfulness of being, losing the participatory mode.","Aletheia (truth as disclosure) is the recovery of participatory knowing through serious play."],"notes":"Heidegger is the godfather of the prophets Vervaeke ends the series with: Tillich, Jung, Corbin, Barfield. Vervaeke is ambivalent, admiring philosophically but troubled by Heidegger's politics."},{"id":"luther","canonicalName":"Martin Luther","aliases":["Martin Luther"],"shortBio":"German theologian (1483-1546), Augustinian monk, instigator of the Protestant Reformation, translator of the Bible into German.","roleInArgument":"Luther radicalizes Augustinian-Pauline inner conflict into self-loathing, makes faith mere acceptance of God's arbitrary grace, abolishes the monastery (the institution of wisdom), and creates the cultural training for narcissism. Together with the scientific revolution, Vervaeke argues, the Protestant Reformation is the joint engine of the meaning crisis.","introducedIn":21,"discussedIn":[21,23],"associatedConcepts":["the-meaning-crisis"],"keyClaimsAbout":["Luther's sola fide reduces faith to acceptance of unearned arbitrary grace.","His abolition of the monastery destroys the wisdom institution paired with knowledge.","He inadvertently creates the cultural grammar of narcissism, worthlessness plus craving for unearned positive regard.","The Protestant Reformation is co-engine, with the scientific revolution, of the meaning crisis."],"notes":"Vervaeke is severely critical of Luther while acknowledging the genuine insight in Luther's wrestling with parasitic processing."},{"id":"matt-rossano","canonicalName":"Matt Rossano","aliases":[],"shortBio":"American anthropologist of religion, author of Supernatural Selection, theorist of ritual and Upper Paleolithic cognitive evolution.","roleInArgument":"Rossano provides the argument that meditation-like practices drove the Upper Paleolithic transition, that supernatural selection via ritual cognition shaped the evolution of human meaning-making.","introducedIn":1,"discussedIn":[1,2],"associatedConcepts":["the-upper-paleolithic-transition","shamanism","psycho-technology"],"keyClaimsAbout":["Meditation-like ritual practices contributed to human cognitive evolution.","Supernatural selection: religious-ritual practices were selected for their cognitive benefits."],"notes":"Cited alongside Winkelman in the Upper Paleolithic transition argument."},{"id":"merleau-ponty","canonicalName":"Maurice Merleau-Ponty","aliases":[],"shortBio":"French phenomenologist (1908-1961), author of Phenomenology of Perception.","roleInArgument":"Merleau-Ponty supplies the notion of optimal grip and the phenomenological foundation for embodied, embedded cognition, picked up by Dreyfus and central to Vervaeke's account of consciousness's transjective optimization.","introducedIn":10,"discussedIn":[10,31,38,47],"associatedConcepts":["optimal-grip","transjective-relations","4e-cognition"],"keyClaimsAbout":["Optimal grip names the body's dynamic adjustment for maximum interactional contact.","Perception is embodied and embedded, not representation in the head.","The lived body is the ground of meaning."],"notes":"Cited especially in the cognitive-science episodes."},{"id":"meister-eckhart","canonicalName":"Meister Eckhart","aliases":["Eckhart"],"shortBio":"German Dominican mystic and theologian (c. 1260-1328), central figure of the Rhineland mystics, deeply influenced by Neoplatonism.","roleInArgument":"Eckhart represents the Rhineland mystics' transformation of the normative order from Plotinian ascent into descent spirituality, in which love is the will negating itself to make space for God's flowing in. Vervaeke praises Eckhart's wisdom while diagnosing the radicalization of self-negation that culminates in Luther and feeds into the meaning crisis.","introducedIn":20,"discussedIn":[20,21,47],"associatedConcepts":["normative-order","neoplatonism","self-transcendence"],"keyClaimsAbout":["Eckhart inverts ascent spirituality into descent spirituality, God flows into the self that negates itself.","Love is not what moves the will but the way the will moves when it negates self-assertion.","Eckhart is a favorite author of Vervaeke's, especially for overcoming attachment to thought and self-image.","His self-negation, radicalized by Luther, becomes self-loathing and the cultural seedbed for narcissism."],"notes":"Caputo's book on the mystical element in Heidegger's thought traces Heidegger back through Eckhart."},{"id":"michael-anderson","canonicalName":"Michael Anderson","aliases":["M.L. Anderson"],"shortBio":"American cognitive scientist, theorist of neural reuse and exaptation in brain function.","roleInArgument":"Anderson's theory of cognitive exaptation, that the brain reuses mechanisms evolved for one function in service of new functions, is foundational for Vervaeke's account of how shamanic practices, mystical exaptations of self-machinery, and psycho-technologies could yield new capacities.","introducedIn":1,"discussedIn":[1,12],"associatedConcepts":["exaptation","psycho-technology"],"keyClaimsAbout":["The brain reuses mechanisms evolved for one purpose in other cognitive functions.","Cognitive exaptation explains the rapid emergence of new capacities without biological change."],"notes":"Vervaeke uses Anderson's work repeatedly when explaining how cognitive exaptation generates new functions."},{"id":"polanyi","canonicalName":"Michael Polanyi","aliases":[],"shortBio":"Hungarian-British polymath (1891-1976), philosopher of science and tacit knowledge, author of Personal Knowledge.","roleInArgument":"Polanyi gives Vervaeke the structural analysis of attention as subsidiary versus focal awareness, the transparency-opacity shift, which becomes one of the two axes of attentional scaling underlying mindfulness, insight, and the rest of the cognitive-science apparatus.","introducedIn":9,"discussedIn":[9],"associatedConcepts":["attention","perspectival-knowing","mindfulness"],"keyClaimsAbout":["Attention has from-to structure: subsidiary awareness through which we are focally aware of something.","We can shift from looking through something (transparency) to looking at it (opacity).","This structuring is central to mindfulness practice."],"notes":"Polanyi's tacit-knowledge framework also feeds into Vervaeke's account of procedural and participatory knowing."},{"id":"michael-winkelman","canonicalName":"Michael Winkelman","aliases":[],"shortBio":"American anthropologist, leading researcher on shamanism and altered states of consciousness.","roleInArgument":"Winkelman's anthropological work on shamanism as universal across hunter-gatherer groups grounds Vervaeke's claim that shamanic psycho-technologies represent a fundamental human cognitive innovation.","introducedIn":1,"discussedIn":[1,2],"associatedConcepts":["shamanism","altered-states-of-consciousness","the-upper-paleolithic-transition"],"keyClaimsAbout":["Shamanism is universal across hunter-gatherer cultures.","Shamans are an archetypal figure across history.","Shamanic states involve enhanced cognitive integration across brain regions."],"notes":"Cited frequently in episodes 1-2 on the Upper Paleolithic transition."},{"id":"csikszentmihalyi","canonicalName":"Mihaly Csikszentmihalyi","aliases":["Csikszentmihalyi"],"shortBio":"Hungarian-American psychologist (1934-2021), originator of flow theory, author of Flow: The Psychology of Optimal Experience.","roleInArgument":"Csikszentmihalyi's flow theory anchors Vervaeke's account of the cognitive scientific substrate of meaning-making and the shamanic, mystical, and mindfulness experiences. The structural conditions of flow (skills meeting demands, tight feedback, error mattering) match the conditions Vervaeke uses for relevance realization.","introducedIn":2,"discussedIn":[2,9,28,32,33,40,45],"associatedConcepts":["flow","altered-states-of-consciousness"],"keyClaimsAbout":["Flow is the optimal experience in which skills are stretched to meet slightly exceeding demands.","Flow requires clear information, tight feedback, and error mattering.","Flow is universal across cultures, ages, genders, languages.","The frequency of flow predicts meaning in life."],"notes":"Vervaeke published cognitive-science work on flow in 2013 with Bennett and Ferraro, building on Csikszentmihalyi."},{"id":"monika-ardelt","canonicalName":"Monika Ardelt","aliases":[],"shortBio":"American sociologist and gerontologist (b. 1955), professor at the University of Florida, developer of a leading three-factor model of wisdom.","roleInArgument":"Ardelt's three-factor (cognitive, reflective, affective) model of wisdom, emphasizing self-transcendence, compassion, and the integration of mind and heart, is one of Vervaeke's main reference points in his synthesis of wisdom theories.","introducedIn":43,"discussedIn":[43,44,45],"associatedConcepts":["wisdom"],"keyClaimsAbout":["Wisdom has three integrated factors: cognitive, reflective, and affective.","Wisdom centrally involves perspective-taking and compassion.","Wisdom is enhanced by agape and connectedness to others."],"notes":"Vervaeke explicitly integrates Ardelt's model into his synthesis of wisdom theories."},{"id":"barfield","canonicalName":"Owen Barfield","aliases":[],"shortBio":"British philosopher and poet (1898-1997), associated with the Inklings (with C.S. Lewis and Tolkien), author of works on the evolution of consciousness.","roleInArgument":"Barfield is the final prophet of the meaning crisis Vervaeke discusses, contributing the historical analysis of how consciousness's relation to symbol has changed and how poetic-symbolic knowing might be recovered. Discussed alongside Tillich, Jung, and Corbin in the final episodes.","introducedIn":39,"discussedIn":[39,46,47,50],"associatedConcepts":["the-symbol","the-prophets-of-the-meaning-crisis"],"keyClaimsAbout":["Barfield analyzes the historical evolution of consciousness and our changing relation to symbol.","He recovers an account of poetic-symbolic participation.","Barfield is one of the prophets Vervaeke proposes to put in dialogue with his own response to the meaning crisis."],"notes":"Vervaeke acknowledges he can give Barfield less time than the other prophets, but treats him as part of the closing dialogue."},{"id":"paul","canonicalName":"Paul (Saul of Tarsus)","aliases":["Saul","Paul the Apostle","Saint Paul"],"shortBio":"First-century Jewish-Roman convert (c. 5 CE-65 CE), former persecutor of early Christians, foundational theologian whose epistles shape Christianity.","roleInArgument":"Paul personalizes the cosmic Exodus into his own inner conflict between the old man and the new man, projecting his inner conflict onto God himself (justice vs. agape). His radical message of love (1 Corinthians 13) gives the New Testament its participatory-knowing core, but his projection of conflict onto God supplies a darker template that runs through Augustine and Luther into the meaning crisis.","introducedIn":15,"discussedIn":[16,17,19,20,21,24,25],"associatedConcepts":["agape","gnosis","metanoia","akrasia","inner-conflict"],"keyClaimsAbout":["Paul has a transformative awakening experience on the road to Damascus.","Paul renders agape as the most excellent way in 1 Corinthians 13.","Paul's inner conflict between the old Saul and the new Paul gets projected onto God himself.","Paul lays the seedbed for Augustinian-Lutheran narratives of self-loathing requiring unearned grace."],"notes":"Vervaeke is genuinely ambivalent about Paul, celebrating the agape teaching while diagnosing the projected inner conflict as a dangerous cultural template."},{"id":"baltes-staudinger","canonicalName":"Paul Baltes and Ursula Staudinger","aliases":["Berlin wisdom paradigm authors"],"shortBio":"German psychologists; Baltes (1939-2006) led the Max Planck Institute for Human Development; Staudinger (b. 1959) co-developed the Berlin wisdom paradigm.","roleInArgument":"The Berlin Wisdom Paradigm provides Vervaeke with the most empirically developed account of wisdom in psychology, identifying five criteria (rich factual knowledge, rich procedural knowledge, lifespan contextualism, value relativism, awareness of uncertainty). Integrated into Vervaeke's synthesis.","introducedIn":12,"discussedIn":[11,12,43,44,45],"associatedConcepts":["wisdom"],"keyClaimsAbout":["Five criteria define wisdom: rich factual knowledge, rich procedural knowledge, lifespan contextualism, value relativism, awareness of uncertainty.","Wisdom involves expert knowledge of the fundamental pragmatics of life.","Wisdom is a meta-heuristic integrating multiple kinds of knowing."],"notes":"The Berlin paradigm is one of Vervaeke's three primary empirical anchors (with Ardelt and Sternberg) for the cognitive science of wisdom."},{"id":"tillich","canonicalName":"Paul Tillich","aliases":[],"shortBio":"German-American Christian existentialist philosopher and theologian (1886-1965), author of The Courage to Be.","roleInArgument":"Tillich is a key prophet of the meaning crisis for Vervaeke, articulating the response in terms of the courage to be, the ground of being (God beyond the God of theism), and the rediscovery of sacredness as something deeper than supernaturalism. Tillich was the first non-Jewish academic fired by the Nazis and is morally exemplary.","introducedIn":14,"discussedIn":[3,14,15,18,21,25,39,46,47,48,49,50],"associatedConcepts":["ground-of-being","the-courage-to-be","the-sacred","religion-that-is-not-a-religion","the-prophets-of-the-meaning-crisis","the-symbol"],"keyClaimsAbout":["Tillich diagnoses the meaning crisis and proposes the courage to be as the existential response.","He invokes the God beyond the God of theism, the ground of being.","He develops a powerful theory of religious symbols.","He coined the use of Kairos for turning points in history."],"notes":"Vervaeke recommends The Courage to Be repeatedly. Tillich's theory of symbol feeds into Vervaeke's account of mythos."},{"id":"plato","canonicalName":"Plato","aliases":[],"shortBio":"Ancient Greek philosopher (c. 428-348 BCE), student of Socrates, founder of the Academy in Athens, author of dialogues that shape Western philosophy.","roleInArgument":"Plato is one of the two foundational feet of Western civilization (with the Bible). His Myth of the Cave, divided psyche, theory of forms (idos), and anagogic notion of wisdom are the conceptual sources Vervaeke returns to throughout. Plato also creates the first psychological theory and is treated as sacred, an inexhaustible font of insight.","introducedIn":4,"discussedIn":[4,5,6,7,16,18,19,24,25,26,35,39,40,42,43,44,45,46,47,50],"associatedConcepts":["the-platonic-project","the-myth-of-the-cave","the-divided-psyche","anagoge","the-good","wisdom","self-transcendence","logos","philia-sophia"],"keyClaimsAbout":["Plato traumatized by Socrates's death formulates wisdom as inner harmony plus contact with reality.","Plato gives us the first psychological theory: man-lion-monster tripartite psyche.","Plato's Myth of the Cave is the paradigm of anagoge, self-transformation as ascent into reality.","Plato's idos (form, structural-functional organization) is sacred, an inexhaustible font."],"notes":"Vervaeke uses Plato as his anchor across all 50 episodes. Many of his technical terms (idos, anagoge, logos, the Good) are translations from Plato."},{"id":"plotinus","canonicalName":"Plotinus","aliases":[],"shortBio":"Third-century Hellenistic philosopher (204-270 CE) who lived in Roman Egypt and Rome, founder of Neoplatonism, author of the Enneads.","roleInArgument":"Plotinus is Vervaeke's exemplar of the grand unified theory of ancient spirituality, integrating Aristotle's worldview, Stoic therapy, and Platonic spirituality into one system in which levels of reality, of consciousness, and of self ascend together toward The One. He provides the normative order Vervaeke contrasts with the nomological and narrative.","introducedIn":18,"discussedIn":[12,18,19,20,24,35,47,49,50],"associatedConcepts":["neoplatonism","the-one","anagoge","normative-order","the-platonic-project"],"keyClaimsAbout":["Plotinus integrates Aristotelian science, Stoic therapy, and Platonic spirituality into a unified system.","The One is that by which all things are realized but which itself can only be united with through being, not knowing.","Realness is oneness, degree of structural-functional integration.","Vervaeke describes Neoplatonism (following Versluis) as the bedrock of Western spirituality."],"notes":"Vervaeke leans heavily on Eric Perl's interpretation of Plotinus in 'Thinking Being.'"},{"id":"pythagoras","canonicalName":"Pythagoras","aliases":[],"shortBio":"Ancient Greek philosopher and mathematician (c. 570-495 BCE), founder of a religious-philosophical community, associated with the Pythagorean theorem.","roleInArgument":"Pythagoras represents the rediscovery of shamanic psycho-technologies, soul flight, ritual transformation, wedded to the new psycho-technologies of mathematical reasoning. He invents the word 'philosophy' (philia-sophia) and the word 'cosmos,' and he sets up the Platonic linkage between rational pattern-recognition and self-transcendence.","introducedIn":3,"discussedIn":[3,4,5],"associatedConcepts":["the-axial-revolution","philia-sophia","shamanism","self-transcendence"],"keyClaimsAbout":["Pythagoras exapts shamanic soul flight into rational ascent through mathematical patterns.","He coins the term 'cosmos' (beautiful order) and 'philosophy' (friendship-love of wisdom).","Discovers the octave and mathematical proportion in the world."],"notes":"Vervaeke uses Pythagoras as the bridge between pre-axial shamanism and the Greek axial revolution."},{"id":"descartes","canonicalName":"René Descartes","aliases":["Descartes"],"shortBio":"French philosopher and mathematician (1596-1650), foundational figure of modern philosophy, originator of mind-body dualism.","roleInArgument":"Descartes intensifies the modern entrapment in the mind by making the mind a self-enclosed substance distinct from matter, certifying that we need no transformation to reach truth, only the right method. Vervaeke argues this denies the participatory transformation central to the axial revolution and helps drive the meaning crisis.","introducedIn":21,"discussedIn":[21,22,25,26,47],"associatedConcepts":["the-meaning-crisis"],"keyClaimsAbout":["Descartes makes mind a self-enclosed substance separate from matter.","His method excludes the perspectival, participatory transformation central to the axial revolution.","Descartes accelerates the disconnection from reality begun by Copernicus and Galileo.","He claims contact with ultimate reality requires no transformation, only the right computation."],"notes":"Pascal's diagnosis of the loss of the Spirit of Finesse is Vervaeke's main framing of what Descartes cost us."},{"id":"robert-bellah","canonicalName":"Robert Bellah","aliases":[],"shortBio":"American sociologist of religion (1927-2013), author of Religion in Human Evolution.","roleInArgument":"Bellah supplies the concept of second-order thinking, the metacognitive capacity that emerges when literacy and numeracy are internalized, as the cognitive substrate of the axial revolution.","introducedIn":2,"discussedIn":[2],"associatedConcepts":["second-order-thinking","the-axial-revolution"],"keyClaimsAbout":["Second-order thinking emerges when psycho-technologies are internalized into metacognition.","The cognitive substrate of the axial revolution is the development of second-order thinking."],"notes":"Vervaeke's main source for the cognitive-evolutionary account of axial-age cognition."},{"id":"sternberg","canonicalName":"Robert Sternberg","aliases":[],"shortBio":"American cognitive psychologist (b. 1949), professor at Cornell, developer of the balance theory of wisdom.","roleInArgument":"Sternberg's balance theory of wisdom, wisdom as the application of intelligence and creativity toward a common good through the balance of intrapersonal, interpersonal, and extrapersonal interests, feeds into Vervaeke's synthesis of wisdom theories.","introducedIn":44,"discussedIn":[44,45],"associatedConcepts":["wisdom"],"keyClaimsAbout":["Wisdom is the application of intelligence and creativity toward a common good.","Wisdom balances intrapersonal, interpersonal, and extrapersonal interests.","Wisdom depends on the fit of a wise solution to its context, inherently transjective."],"notes":"Vervaeke draws on Sternberg's emphasis on fittedness and transjective context-sensitivity."},{"id":"robin-hogarth","canonicalName":"Robin Hogarth","aliases":["Hogarth"],"shortBio":"Cognitive scientist and decision researcher; author of Educating Intuition.","roleInArgument":"Hogarth provides the naturalistic account Vervaeke endorses: intuition is the felt sense of implicit-learning output, not anything magical, and crucially, intuition can be educated by shaping the learning environment.","introducedIn":2,"discussedIn":[2],"associatedConcepts":["implicit-learning","procedural-knowing"],"keyClaimsAbout":["Intuition is real but naturalistic: it's the surface of implicit pattern-recognition.","Intuition can be trained, 'kind' learning environments educate it; 'wicked' environments mislead it."],"notes":null},{"id":"otto","canonicalName":"Rudolf Otto","aliases":[],"shortBio":"German Lutheran theologian and philosopher of religion (1869-1937), author of The Idea of the Holy.","roleInArgument":"Otto coins 'the numinous', the experience of the sacred as simultaneously fascinating and terrifying, with mystery at its core. Vervaeke uses Otto's three aspects of the numinous to extend Geertz's framework of sacredness.","introducedIn":34,"discussedIn":[34,35],"associatedConcepts":["the-numinous","the-sacred"],"keyClaimsAbout":["The numinous has three central aspects: mystery, fascination, and terror.","Sacredness involves both homing (Geertz) and transgressing (Otto).","Influences Kant and feeds into modern philosophy of religion."],"notes":"Vervaeke uses Otto and Geertz together to construct his account of the sacred."},{"id":"sartre","canonicalName":"Sartre","aliases":["Jean-Paul Sartre"],"shortBio":"French existentialist philosopher (1905-1980), author of Being and Nothingness.","roleInArgument":"Sartre supplies the maxim 'Hell is other people' and the existentialist framing of radical freedom that Vervaeke uses to characterize the modern condition.","introducedIn":12,"discussedIn":[12,17],"associatedConcepts":["the-meaning-crisis","absurdity"],"keyClaimsAbout":["Hell is other people, the existentialist articulation of interpersonal difficulty.","Existence precedes essence, we exist before we discover what we are.","Radical freedom is also radical responsibility."],"notes":"Brief but recurring reference."},{"id":"siddhartha-gautama","canonicalName":"Siddhartha Gautama","aliases":["the Buddha","Buddha"],"shortBio":"Ancient North Indian prince and spiritual teacher (c. 563-483 BCE), founder of Buddhism, known as the Buddha (the awakened one).","roleInArgument":"Siddhartha embodies the axial revolution in India. Vervaeke treats his myth, leaving the palace, the middle path, mindfulness as sati, the four noble truths as ennobling provocations, and the eightfold path as a counteractive dynamical system, as a paradigm of the cognitive-scientific reverse engineering of enlightenment.","introducedIn":7,"discussedIn":[7,8,9,10,11,12,13,38,39,45],"associatedConcepts":["dukkha","the-eightfold-path","having-mode-being-mode","mindfulness","parasitic-processing","modal-confusion"],"keyClaimsAbout":["Siddhartha's leaving the palace is a myth of escaping modal confusion in the having-mode.","The middle path rejects both self-indulgence and self-denial in favor of optimization.","Sati (mindfulness) is the deep remembering of the being-mode.","The four noble truths are better understood as ennobling provocations than as propositions to believe."],"notes":"Vervaeke draws extensively on Stephen Batchelor's reading of Buddhism without beliefs."},{"id":"freud","canonicalName":"Sigmund Freud","aliases":[],"shortBio":"Austrian neurologist and founder of psychoanalysis (1856-1939).","roleInArgument":"Freud is invoked by Vervaeke chiefly to point out that Freud's id/ego/superego rediscovers Plato's tripartite psyche, and that Freud's misreading of Agape as merely erotic is part of the modern reduction of love.","introducedIn":5,"discussedIn":[5,16,21,24],"associatedConcepts":["the-divided-psyche"],"keyClaimsAbout":["Freud rediscovers Plato's tripartite psyche as id, ego, superego.","Freud reads the child-parent relation through eroticism, Vervaeke calls this too simplistic.","Psychoanalytic insight into unconscious patterns informs Vervaeke's account of parasitic processing."],"notes":"Vervaeke treats Freud respectfully but as a partial recovery of older insights."},{"id":"socrates","canonicalName":"Socrates","aliases":[],"shortBio":"Ancient Greek philosopher (c. 470-399 BCE) who lived in Athens, was tried and executed for impiety, and left no writings but inspired Plato's dialogues.","roleInArgument":"Socrates epitomizes the axial revolution in Greece for Vervaeke, the personal incarnation of the demand to align salience with truth and to avoid bullshitting oneself. The Socratic method, Socratic self-knowledge, and Socrates's willingness to die for the examined life are the templates for everything that follows in the Western wisdom tradition.","introducedIn":1,"discussedIn":[1,3,4,5,6,14,16,23,24,39,40,41,42,44,45,46,50],"associatedConcepts":["the-axial-revolution","wisdom","self-deception","bullshit","philia-sophia","the-platonic-project"],"keyClaimsAbout":["Socrates exemplifies the axial demand to keep salience and truth in alignment.","The Socratic Method (elenchus) provokes aporia and self-recognition of one's bullshitting.","The unexamined life is not worth living because it leaves one awash in bullshit.","Socrates knew TA EROTIKA, knowing how to love well, what to truly care about."],"notes":"Vervaeke treats Socrates as both a historical figure and the patron embodiment of the cultivation of wisdom, quoted and re-invoked from episode 1 through episode 50."},{"id":"stephen-batchelor","canonicalName":"Stephen Batchelor","aliases":[],"shortBio":"British Buddhist teacher and author (b. 1953), proponent of secular and agnostic Buddhism.","roleInArgument":"Batchelor gives Vervaeke the framework for reading the Four Noble Truths as ennobling provocations rather than propositions to believe, and for reading Buddhism existentially in terms of the being-mode and modal confusion. He is also Vervaeke's source for the interpretation crisis (within-tradition vs. outside-tradition) when reading Buddhism.","introducedIn":7,"discussedIn":[7,13,14],"associatedConcepts":["having-mode-being-mode","dukkha"],"keyClaimsAbout":["The four noble truths are better understood as ennobling provocations than as creedal propositions.","Buddhism's value lies in remembering the being-mode, not in beliefs.","We face an interpretation crisis when importing Buddhism, within-tradition vs. outside-tradition."],"notes":"Vervaeke and Batchelor have met and dined together; Batchelor's books (Alone with Others, Buddhism Without Beliefs, After Buddhism) are key references."},{"id":"steve-taylor","canonicalName":"Steve Taylor","aliases":[],"shortBio":"British psychologist and author, researcher on awakening experiences, author of Waking from Sleep.","roleInArgument":"Taylor's collection of awakening-experience interviews provides Vervaeke with the phenomenological breadth of mystical experiences across cultures and traditions, and the analysis of disruptive strategies that induce them.","introducedIn":1,"discussedIn":[1,10,11,12],"associatedConcepts":["higher-states-of-consciousness","altered-states-of-consciousness"],"keyClaimsAbout":["Disruptive strategies (sleep deprivation, fasting, isolation) reliably produce awakening experiences.","Awakening experiences are universal across cultures.","These experiences transform lives in measurably positive ways."],"notes":"Taylor's Waking from Sleep contains the ~150 first-person interviews Vervaeke references."},{"id":"kierkegaard","canonicalName":"Søren Kierkegaard","aliases":[],"shortBio":"Danish philosopher and theologian (1813-1855), generally considered the first existentialist philosopher.","roleInArgument":"Kierkegaard critiques Hegel for reducing everything to propositional knowing and losing the personal, perspectival, transformative dimension of existence. He introduces the leap of faith, the existential commitment beyond inference, that Vervaeke argues prefigures L.A. Paul's transformative experience and Callard's proleptic aspiration.","introducedIn":14,"discussedIn":[14,23,24,25,46,47],"associatedConcepts":["self-transcendence","transformative-experience"],"keyClaimsAbout":["Kierkegaard says 'Hegel made a system and then sat down beside it', diagnosing the loss of the personal.","He uses 'anxiety' as the technical existential term (over fear).","His leap of faith prefigures the rationality of aspiration and transformative experience.","Hegel offers only epistemic self-transcendence, not ethical self-transcendence."],"notes":"Vervaeke pairs Kierkegaard with Westphal's distinction between epistemic and ethical self-transcendence."},{"id":"aquinas","canonicalName":"Thomas Aquinas","aliases":["Aquinas"],"shortBio":"Italian Dominican theologian (1225-1274), author of the Summa Theologica, central figure of medieval Scholasticism.","roleInArgument":"Aquinas restructures the Augustinian synthesis in response to the rediscovery of Aristotelian science, splitting the world into natural (known by reason) and supernatural (known by faith), with faith as love transforming the will. Vervaeke argues this separation, while solving Aquinas's problem, sets up the modern collapse by making supernatural reality conditional on a viability we eventually lose.","introducedIn":19,"discussedIn":[19,20,24],"associatedConcepts":["nomological-order","two-worlds-mythology"],"keyClaimsAbout":["Aquinas separates the natural world (reason) from the supernatural world (faith).","He understands faith as love transforming the will rather than as participatory knowing.","This separation makes the supernatural world vulnerable when its viability collapses.","Aquinas is the Thomas Aquinas of medieval Catholicism, what Hegel later attempts for Protestantism."],"notes":"Vervaeke describes Hegel as the Thomas Aquinas of Protestantism, making the comparison explicit."},{"id":"cheetham","canonicalName":"Tom Cheetham","aliases":[],"shortBio":"American author of multiple books on Henry Corbin and the imaginal, including All the World an Icon.","roleInArgument":"Cheetham is Vervaeke's primary contemporary interpreter of Corbin, guiding the discussion of the imaginal, the divine double, and Sufic mysticism in the final episodes.","introducedIn":47,"discussedIn":[21,47,48,49,50],"associatedConcepts":["the-imaginal","the-divine-double"],"keyClaimsAbout":["Cheetham's trilogy of books on Corbin makes the imaginal accessible to contemporary readers.","He emphasizes the practical and spiritual dimensions of Corbin's work."],"notes":"Cited in the closing episodes as the secondary source on Corbin."},{"id":"william-james","canonicalName":"William James","aliases":["James"],"shortBio":"American philosopher and psychologist (1842–1910); founder of pragmatism, author of The Varieties of Religious Experience and The Will to Believe.","roleInArgument":"Vervaeke draws on James's distinction between 'live' vs 'dead' options to frame how a worldview becomes existentially livable, and on Varieties of Religious Experience as a touchstone for naturalistic engagement with the sacred.","introducedIn":21,"discussedIn":[21,33,39],"associatedConcepts":["religio","the-sacred","higher-states-of-consciousness","religion-that-is-not-a-religion"],"keyClaimsAbout":["James's live/dead option distinction is how a worldview moves from intellectual assent to participatory engagement.","Varieties of Religious Experience provides a naturalistic vocabulary for engaging the sacred without theological commitment."],"notes":"Cited by Vervaeke as part of the lineage of psychologists who took religious phenomena seriously as cognitive-existential structures."},{"id":"william-of-ockham","canonicalName":"William of Ockham","aliases":["Ockham"],"shortBio":"English Franciscan friar and philosopher (c. 1287-1347), author of nominalism and Ockham's Razor.","roleInArgument":"Ockham makes God's will supersede his reason, eliminates real universals (nominalism), and renders any order in the world as something arbitrarily imposed. This proto-modern view trains the cultural grammar that will explode in the scientific revolution and the Protestant Reformation, preparing the conditions for the meaning crisis.","introducedIn":20,"discussedIn":[20,21,23],"associatedConcepts":[],"keyClaimsAbout":["Ockham makes God's will, not God's reason, primary, God speaks the world into existence arbitrarily.","Nominalism: there are no universals out there, only individuals and the categories our language imposes.","Reality becomes a chaotic backdrop against which a battle of wills occurs.","Ockham's Razor is misused today: he did not intend it as a tool of dismissive skepticism."],"notes":"Vervaeke considers Ockham a more decisive turn toward modernity than is often appreciated."},{"id":"zeno-of-citium","canonicalName":"Zeno of Citium","aliases":["Zeno"],"shortBio":"Greek-Phoenician philosopher (c. 334-262 BCE), founder of Stoicism, taught on the painted stoa in Athens.","roleInArgument":"Zeno integrates Cynic confrontation with Platonic argumentation into Stoicism, insisting we are inherently social, the philosopher cannot leave the polis. Originator of Stoic psycho-technologies (prosoche, procheiron) for managing the process of co-identification.","introducedIn":14,"discussedIn":[14],"associatedConcepts":["agent-arena-relationship","self-deception"],"keyClaimsAbout":["Cynic confrontation must be integrated with Platonic argumentation.","We are inherently social, leaving the polis is not an option.","Prosoche (paying attention to attention) and procheiron are the core Stoic psycho-technologies.","It's not what you set your heart on, but how you set your heart."],"notes":"Vervaeke's bridge from Cynicism to Stoicism."}],"epTitles":{"0":"Introduction","1":"Introduction","2":"Flow, Metaphor, and the Axial Revolution","3":"Continuous Cosmos and the Modern World Grammar","4":"Socrates and the Quest for Wisdom","5":"Plato and the Cave","6":"Aristotle, Kant, and Evolution","7":"Aristotle's Worldview and Erich Fromm","8":"Buddha and Mindfulness","9":"Insight","10":"Consciousness","11":"Higher States of Consciousness, Part 1","12":"Higher States of Consciousness, Part 2","13":"Buddhism and Parasitic Processing","14":"Epicureans, Cynics, and Stoics","15":"Marcus Aurelius and Jesus","16":"Christianity and Agape","17":"Gnosis and Existential Inertia","18":"Plotinus and Neoplatonism","19":"Augustine and Aquinas","20":"Death of the Universe","21":"Martin Luther and Descartes","22":"Descartes vs. Hobbes","23":"Romanticism","24":"Hegel","25":"The Clash","26":"Cognitive Science","27":"Problem Formulation","28":"Convergence To Relevance Realization","29":"Getting to the Depths of Relevance Realization","30":"RR Meets Dynamical Systems","31":"Embodied, Embedded RR and Dynamical General Intelligence","32":"RR, the Brain, Insight, and Consciousness","33":"The Spirituality of RR: Wonder, Awe, and the Sacred","34":"Sacredness, Horror, Music, and the Symbol","35":"The Symbol, Sacredness, and the Sacred","36":"Religio and the Perennial Problems","37":"Reverse Engineering Enlightenment, Part 2","38":"Agape and 4E Cognitive Science","39":"The Religion of No Religion","40":"Wisdom and Rationality","41":"What is Rationality?","42":"Intelligence, Rationality, and Wisdom","43":"Wisdom and Virtue","44":"Theories of Wisdom","45":"The Nature of Wisdom","46":"Conclusion and the Prophets of the Meaning Crisis","47":"Heidegger","48":"Corbin and the Divine Double","49":"Corbin and Jung","50":"Tillich and Barfield"}}</script>

<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const { concepts, people, epTitles } = DATA;
const conceptById = Object.fromEntries(concepts.map(c => [c.id, c]));
const personById = Object.fromEntries(people.map(p => [p.id, p]));

let state = { tab: 'concepts', filter: 'all', flagship: false, search: '' };

function render() {
  // tabs
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === state.tab));
  // filter bar
  const filterBar = document.getElementById('filter-bar');
  if (state.tab === 'concepts') {
    const clusters = ['all','cognitive-science','historical','normative','practical','methodological'];
    filterBar.innerHTML = clusters.map(c =>
      `<button class="pill ${state.filter === c ? 'active' : ''}" onclick="setFilter('${c}')">${c}</button>`
    ).join('') + ` <button class="pill flagship ${state.flagship ? 'active' : ''}" onclick="toggleFlagship()">★ flagship only</button>`;
  } else if (state.tab === 'people') {
    filterBar.innerHTML = '';
  } else {
    filterBar.innerHTML = '';
  }

  let items = [];
  if (state.tab === 'concepts') {
    items = concepts.filter(c => {
      if (state.filter !== 'all' && c.cluster !== state.filter) return false;
      if (state.flagship && !c.isFlagship) return false;
      if (state.search) {
        const s = state.search.toLowerCase();
        if (!c.canonicalName.toLowerCase().includes(s)
          && !c.definition.toLowerCase().includes(s)
          && !c.id.toLowerCase().includes(s)
          && !(c.aliases || []).some(a => a.toLowerCase().includes(s))) return false;
      }
      return true;
    });
  } else if (state.tab === 'people') {
    items = people.filter(p => {
      if (state.search) {
        const s = state.search.toLowerCase();
        if (!p.canonicalName.toLowerCase().includes(s)
          && !p.shortBio.toLowerCase().includes(s)
          && !p.id.toLowerCase().includes(s)) return false;
      }
      return true;
    });
  } else if (state.tab === 'episodes') {
    items = Object.entries(epTitles).map(([num, title]) => ({ num: +num, title })).sort((a,b) => a.num - b.num);
    if (state.search) {
      const s = state.search.toLowerCase();
      items = items.filter(e => e.title.toLowerCase().includes(s));
    }
  }

  document.getElementById('stats').innerHTML = `Showing <strong>${items.length}</strong> ${state.tab}`;

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  empty.style.display = items.length === 0 ? '' : 'none';

  if (state.tab === 'concepts') {
    grid.innerHTML = items.map(c => `
      <div class="card ${c.isFlagship ? 'flagship' : ''}" onclick="showConcept('${c.id}')">
        <h3 class="card-title">${escape(c.canonicalName)}</h3>
        <div class="card-meta">
          <span class="cluster-tag">${c.cluster}</span>
          <span>depth ${c.depth}</span>
          <span>intro ep ${c.introducedIn}</span>
        </div>
        <div class="card-def">${escape(c.definition)}</div>
      </div>
    `).join('');
  } else if (state.tab === 'people') {
    grid.innerHTML = items.map(p => `
      <div class="card" onclick="showPerson('${p.id}')">
        <h3 class="card-title">${escape(p.canonicalName)}</h3>
        <div class="card-meta">
          <span>${p.discussedIn.length} episode${p.discussedIn.length === 1 ? '' : 's'}</span>
          <span>intro ep ${p.introducedIn}</span>
        </div>
        <div class="card-def">${escape(p.shortBio)}</div>
      </div>
    `).join('');
  } else if (state.tab === 'episodes') {
    grid.innerHTML = items.map(e => {
      const ec = concepts.filter(c => c.developedIn.includes(e.num) || c.introducedIn === e.num);
      const ep = people.filter(p => p.discussedIn.includes(e.num));
      return `
      <div class="card" onclick="showEpisode(${e.num})">
        <h3 class="card-title">${e.num}. ${escape(e.title)}</h3>
        <div class="card-meta">
          <span>${ec.length} concept${ec.length === 1 ? '' : 's'}</span>
          <span>${ep.length} thinker${ep.length === 1 ? '' : 's'}</span>
        </div>
      </div>
    `;
    }).join('');
  }
}

function escape(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function showConcept(id) {
  const c = conceptById[id]; if (!c) return;
  const treatments = treatmentSummary(c);
  const body = `
    <h2>${c.isFlagship ? '★ ' : ''}${escape(c.canonicalName)}</h2>
    <div class="id">${c.id} · ${c.cluster} · depth ${c.depth}</div>
    <section>
      <p class="def">${escape(c.definition)}</p>
    </section>
    <section>
      <h3>Source passage (Ep ${c.sourcePassage.episode})</h3>
      <div class="quote">
        <span class="ep">Episode ${c.sourcePassage.episode}${epTitles[c.sourcePassage.episode] ? ' · ' + escape(epTitles[c.sourcePassage.episode]) : ''}</span>
        "${escape(c.sourcePassage.quote)}"
      </div>
    </section>
    ${c.notes ? `<section><h3>Notes</h3><p>${escape(c.notes)}</p></section>` : ''}
    <section>
      <h3>Where it appears</h3>
      <p><strong>Introduced:</strong> ${epRefPill(c.introducedIn)}</p>
      ${c.developedIn.length ? `<p><strong>Developed:</strong> ${c.developedIn.map(epRefPill).join('')}</p>` : ''}
      ${c.appliedIn.length ? `<p><strong>Applied:</strong> ${c.appliedIn.map(epRefPill).join('')}</p>` : ''}
    </section>
    ${c.prerequisites.length ? `<section><h3>Prerequisites</h3><p>${c.prerequisites.map(conceptRefPill).join('')}</p></section>` : ''}
    ${c.relatedConcepts.length ? `<section><h3>Related concepts</h3><p>${c.relatedConcepts.map(conceptRefPill).join('')}</p></section>` : ''}
    ${c.contrastedWith && c.contrastedWith.length ? `<section><h3>Contrasted with</h3><p>${c.contrastedWith.map(conceptRefPill).join('')}</p></section>` : ''}
    ${c.associatedPeople.length ? `<section><h3>Associated thinkers</h3><p>${c.associatedPeople.map(personRefPill).join('')}</p></section>` : ''}
    ${c.subConcepts && c.subConcepts.length ? `
      <section>
        <h3>Sub-concepts (Pass 3 enrichment)</h3>
        ${c.subConcepts.map(sc => `
          <div class="subConcept">
            <div class="sc-name">${escape(sc.name)}</div>
            <div class="sc-summary">${escape(sc.summary)}</div>
            ${(sc.passages || []).map(pp => `<div class="quote"><span class="ep">Ep ${pp.episode}</span>"${escape(pp.phrase)}"</div>`).join('')}
          </div>
        `).join('')}
      </section>
    ` : ''}
    ${c.commonConfusions && c.commonConfusions.length ? `
      <section>
        <h3>Common confusions</h3>
        <ul>${c.commonConfusions.map(x => `<li>${escape(x)}</li>`).join('')}</ul>
      </section>
    ` : ''}
    ${c.keyPassages && c.keyPassages.length ? `
      <section>
        <h3>Key passages</h3>
        ${c.keyPassages.map(kp => `
          <div class="keyPassage">
            <div class="role">${escape(kp.role || '')} · Ep ${kp.episode}</div>
            <div>"${escape(kp.phrase)}"</div>
          </div>
        `).join('')}
      </section>
    ` : ''}
  `;
  openModal(body);
}

function showPerson(id) {
  const p = personById[id]; if (!p) return;
  const body = `
    <h2>${escape(p.canonicalName)}</h2>
    <div class="id">${p.id}</div>
    <section>
      <p class="def">${escape(p.shortBio)}</p>
    </section>
    <section>
      <h3>Role in Vervaeke's argument</h3>
      <p>${escape(p.roleInArgument)}</p>
    </section>
    <section>
      <h3>Where they appear</h3>
      <p><strong>Introduced:</strong> ${epRefPill(p.introducedIn)}</p>
      <p><strong>Discussed:</strong> ${p.discussedIn.map(epRefPill).join('')}</p>
    </section>
    ${p.keyClaimsAbout.length ? `
      <section>
        <h3>Key claims Vervaeke makes about them</h3>
        <ul>${p.keyClaimsAbout.map(x => `<li>${escape(x)}</li>`).join('')}</ul>
      </section>
    ` : ''}
    ${p.associatedConcepts.length ? `<section><h3>Associated concepts</h3><p>${p.associatedConcepts.map(conceptRefPill).join('')}</p></section>` : ''}
    ${p.notes ? `<section><h3>Notes</h3><p>${escape(p.notes)}</p></section>` : ''}
  `;
  openModal(body);
}

function showEpisode(num) {
  const title = epTitles[num] || `Episode ${num}`;
  const inEp = concepts.filter(c => c.developedIn.includes(num) || c.introducedIn === num || c.appliedIn.includes(num));
  const peopleEp = people.filter(p => p.discussedIn.includes(num));
  const introd = inEp.filter(c => c.introducedIn === num);
  const developed = inEp.filter(c => c.developedIn.includes(num) && c.introducedIn !== num);
  const applied = inEp.filter(c => c.appliedIn.includes(num) && !developed.includes(c) && !introd.includes(c));
  const body = `
    <h2>Episode ${num}: ${escape(title)}</h2>
    ${introd.length ? `<section><h3>Concepts introduced</h3><p>${introd.map(c => conceptRefPill(c.id)).join('')}</p></section>` : ''}
    ${developed.length ? `<section><h3>Concepts developed</h3><p>${developed.map(c => conceptRefPill(c.id)).join('')}</p></section>` : ''}
    ${applied.length ? `<section><h3>Concepts applied</h3><p>${applied.map(c => conceptRefPill(c.id)).join('')}</p></section>` : ''}
    ${peopleEp.length ? `<section><h3>Thinkers discussed</h3><p>${peopleEp.map(p => personRefPill(p.id)).join('')}</p></section>` : ''}
  `;
  openModal(body);
}

function epRefPill(num) {
  const title = epTitles[num] || '';
  return `<a class="ref-pill ep" onclick="showEpisode(${num})" title="${escape(title)}">Ep ${num}</a>`;
}
function conceptRefPill(id) {
  const c = conceptById[id];
  if (!c) return `<span class="ref-pill" style="color:var(--muted)" title="not in registry">${id}</span>`;
  return `<a class="ref-pill concept" onclick="showConcept('${id}')">${escape(c.canonicalName)}</a>`;
}
function personRefPill(id) {
  const p = personById[id];
  if (!p) return `<span class="ref-pill" style="color:var(--muted)" title="not in registry">${id}</span>`;
  return `<a class="ref-pill person" onclick="showPerson('${id}')">${escape(p.canonicalName)}</a>`;
}

function treatmentSummary(c) {
  const total = c.developedIn.length + c.appliedIn.length + (c.introducedIn ? 1 : 0);
  return total;
}

function openModal(body) {
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('overlay').classList.add('open');
  window.scrollTo({ top: 0, behavior: 'instant' });
  document.getElementById('modal').scrollTop = 0;
}
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

function setTab(t) { state.tab = t; state.search = ''; document.getElementById('search').value = ''; render(); }
function setFilter(f) { state.filter = f; render(); }
function toggleFlagship() { state.flagship = !state.flagship; render(); }

document.querySelectorAll('.tab').forEach(t => t.onclick = () => setTab(t.dataset.tab));
document.getElementById('search').addEventListener('input', e => { state.search = e.target.value; render(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

render();
</script>
</body>
</html>
