t in the flow state, it's gone","role":"exemplar"}],"passages":[]}],"commonConfusions":["Flow is not simply enjoyment or physical pleasure, it is an altered cognitive state characterized by an insight cascade and enhanced implicit learning.","Flow is not effortlessness in the ordinary sense; there is tremendous metabolic effort, yet the effort feels spontaneous and unforced.","Flow is not identical to mindfulness practice, though mindfulness training demonstrably increases the capacity for flow."],"keyPassages":[{"episode":2,"phrase":"the flow state is one in which the demands of the situation just slightly go beyond your skill abilities","role":"definition"},{"episode":2,"phrase":"That's the flow state. It's an insight cascade. So the more you flow, the more you're training your ability for insight.","role":"definition"},{"episode":2,"phrase":"those three criteria that will turn your intuition into good implicit learning are exactly the conditions for flow. Clear information. Tightly coupled feedback. And error matters.","role":"application"},{"episode":38,"phrase":"We can address the reflectiveness gap by the cultivation of flow.","role":"application"}]},{"id":"foolishness","canonicalName":"foolishness","aliases":[],"definition":"The opposite of wisdom: not ignorance (lack of knowledge) but a lack of character such that one knows what is right yet acts otherwise, Aristotle's akrasia, a systematic failure to align salience with truth.","sourcePassage":{"episode":1,"quote":"Ignorance is a lack of knowledge. Foolishness is a lack of wisdom. Foolishness is when your capacity to engage your agency, pursue your goals is undermined and threatened by the self-deception and the self-destructive behavior that is a perennial vulnerability to your cognition."},"depth":2,"cluster":"normative","introducedIn":1,"developedIn":[4,5,6,7,13,40,42,45],"appliedIn":[8,11,12,14,15,16,41,43,44],"prerequisites":[],"relatedConcepts":["wisdom","bullshit","self-deception","parasitic-processing","akrasia"],"contrastedWith":["wisdom"],"associatedPeople":["socrates","aristotle"],"isFlagship":false,"notes":"For Aristotle, foolishness arises from insufficient character even when belief is correct. For Vervaeke, foolishness is endemic because the same machinery that makes us adaptive makes us self-deceptive.","subConcepts":[{"id":"foolishness-vs-ignorance","name":"Foolishness distinguished from ignorance","summary":"Ignorance is a lack of knowledge; foolishness is a lack of wisdom, it is knowing what is right and failing to do it anyway, due to character insufficiency rather than epistemic gaps.","passages":[{"episode":1,"phrase":"Ignorance is a lack of knowledge. Foolishness is a lack of wisdom. Foolishness is when your capacity to engage your agency, pursue your goals is undermined and threatened by the self-deception and the self-destructive behavior that is a perennial vulnerability to your cognition."}]},{"id":"foolishness-as-endemic","name":"Foolishness as endemic to adaptive machinery","summary":"The very cognitive machinery that makes humans brilliantly adaptive, heuristics, fast association, motivated reasoning, also makes them systematically prone to self-deception and self-destruction.","passages":[{"episode":5,"phrase":"What you want to do is get it properly ordered. When you don't order it, think about what this means... Salience and understanding and participation get out of sync with each other."}]}],"commonConfusions":["Foolishness is not stupidity, highly intelligent people are fully capable of foolishness, because foolishness is a character and salience problem, not an information problem.","Foolishness is not a rare pathology, Vervaeke argues it is endemic to the same machinery that makes us adaptive, so everyone is systematically vulnerable.","Fixing foolishness requires more than getting better beliefs, it requires the transformation of character, salience, and participatory knowing that wisdom traditions address."],"keyPassages":[{"episode":1,"phrase":"Ignorance is a lack of knowledge. Foolishness is a lack of wisdom. Foolishness is when your capacity to engage your agency, pursue your goals is undermined and threatened by the self-deception and the self-destructive behavior that is a perennial vulnerability to your cognition.","role":"definition"},{"episode":14,"phrase":"Up until now the main thing that wisdom was trying to deal with was foolishness. And that's not abandoned, but that's now seen as insufficient.","role":"application"},{"episode":6,"phrase":"Akrasia is when you know what the right thing to do is - you KNOW what the right thing to do is - and we talked about this, remember, with the chocolate cake. But you don't do the right thing.","role":"exemplar"}]},{"id":"gnosis","canonicalName":"gnosis","aliases":["gnostic knowing","transformative knowing"],"definition":"A set of psycho-technologies that create a ritual context, like therapy, martial arts, or Jeepform, combining enactive analogy and enactive anagoge powered by an altered (often higher) state of consciousness, by which one is liberated from existential entrapment through participatory transformation.","sourcePassage":{"episode":17,"quote":"Gnosis is to have a set of psychotechnologies that create a ritual context like Jeepform, like martial arts, like therapy that allows us to overcome being existentially stuck, existentially stupefied."},"depth":4,"cluster":"practical","introducedIn":16,"developedIn":[17,18,38,39,48,49],"appliedIn":[19,36,37,40,42,43,44,45,50],"prerequisites":["participatory-knowing","transformative-experience","altered-states-of-consciousness"],"relatedConcepts":["gnosticism","transformative-experience","existential-entrapment","ritual","agape","religio"],"contrastedWith":["existential-entrapment"],"associatedPeople":["corbin","jung","paul","april-deconick"],"isFlagship":false,"notes":"Vervaeke distinguishes gnosis (a salvific way of participatory knowing) from gnosticism (the historical movement and its mythology). He wants to salvage the former without the conspiracy-prone tendencies of the latter.","subConcepts":[{"id":"enactive-analogy-in-gnosis","name":"Enactive analogy as the vehicle of gnosis","summary":"Gnosis works through enacted, not merely described, analogies that bridge the world one is in and the world one aspires to, creating a liminal participatory state in which perspectival and participatory knowing can shift.","passages":[{"episode":17,"phrase":"the enactive analogy has to be similar enough to the world and the person you're trying to become in that world. It has to be similar enough that you can feel it."}]},{"id":"altered-state-empowerment-of-gnosis","name":"Altered state of consciousness as empowering gnosis","summary":"The ritual context of gnosis is always powered by some altered or higher state of consciousness that increases cognitive flexibility, making the enactive analogy and anagoge possible.","passages":[{"episode":17,"phrase":"the psychedelics give you the cognitive flexibility in the flow state and the possibility even of a higher state of consciousness that then empowers this process to get you free from existential entrapment."}]},{"id":"gnosis-vs-gnosticism","name":"Gnosis distinguished from Gnosticism","summary":"Gnosis is a salvific mode of participatory knowing available to cognitive science; Gnosticism is a historical mythological movement that gnosis can be salvaged from without inheriting its conspiracy-prone dualism.","passages":[{"episode":17,"phrase":"Gnosis is to have a set of psychotechnologies that create a ritual context like Jeepform, like martial arts, like therapy that allows us to overcome being existentially stuck, existentially stupefied."}]}],"commonConfusions":["Gnosis is not a body of secret knowledge or hidden propositions; it is a transformative mode of knowing that changes participatory and perspectival knowing, not the propositional layer.","Gnosis is not the same as Gnosticism; Vervaeke explicitly wants to salvage the former while rejecting the latter's dualistic mythology and conspiracy-prone tendencies.","Gnosis is not a single dramatic moment; it requires a constructed ritual context, enactive analogy plus enactive anagoge, that must be carefully crafted with significant skill.","Gnosis is not therapy redescribed; therapy is one modern instance of gnosis, but gnosis is the broader category that includes martial arts, Jeepform, ritual, and contemplative traditions."],"keyPassages":[{"episode":17,"phrase":"Gnosis is to have a set of psychotechnologies that create a ritual context like Jeepform, like martial arts, like therapy that allows us to overcome being existentially stuck, existentially stupefied.","role":"definition"},{"episode":17,"phrase":"what I'm doing is I'm setting this within a ritual context where I'm at, I'm feeling enactive analogy and I'm doing enactive anagoge. I'm doing serious play and I have the flexibility, the cognitive flexibility.","role":"exemplar"},{"episode":18,"phrase":"That enacted ritual should also afford anagoge. It should afford the transframing, the reciprocal anagogic process by which self and world are transformed such that we can go through the sensibility transcendence, which will make a worldview viable to us.","role":"qualification"},{"episode":38,"phrase":"we can respond to existential entrapment by the cultivation of gnosis, which can be empowered by a core capacity for realizing higher states of consciousness.","role":"summary"}]},{"id":"gnosticism","canonicalName":"gnosticism","aliases":["the Gnostics"],"definition":"An axial-within-axial style or movement contemporaneous with early Christianity in which the everyday world is experienced as a prison built by stupid or evil powers, from which a divine spark within us, accessed via gnosis, must be liberated by transcending the gods themselves.","sourcePassage":{"episode":18,"quote":"I'm presenting the Gnostic movement as the axial revolution within the axial revolution."},"depth":3,"cluster":"historical","introducedIn":17,"developedIn":[18,19,49],"appliedIn":[20,21,23,36,38,47,48,50],"prerequisites":["the-axial-revolution"],"relatedConcepts":["gnosis","neoplatonism","existential-entrapment"],"contrastedWith":[],"associatedPeople":["paul","april-deconick","hans-jonas","jung","corbin"],"isFlagship":false,"notes":"Gnosticism has a dark side: it can collapse into conspiracy theory, and antisemitic forms of it feed into Nazism. Vervaeke wants gnosis salvaged from gnosticism.","subConcepts":[{"id":"axial-within-axial","name":"Gnosticism as the axial revolution within the axial revolution","summary":"Gnosticism radicalizes the axial revolution by applying the two-worlds mythology even to the gods, the gods themselves are part of the illusory trap, and transcendence must go beyond all divine authority.","passages":[{"episode":18,"phrase":"I'm presenting the Gnostic movement as the axial revolution within the axial revolution."}]},{"id":"gnostic-mythology-as-scaffolding","name":"Gnostic mythology as scaffolding for gnosis","summary":"The bizarre and elaborate Gnostic mythological narratives are not intended as literal cosmology, they are scaffolding for the participatory knowing of gnosis, the transformative release from existential entrapment.","passages":[]},{"id":"dark-side-of-gnosticism","name":"The dark side: conspiracy and antisemitism","summary":"Gnosticism's tendency to see the everyday world as a prison built by evil powers can collapse into conspiracy theory and has historically fed into deeply antisemitic forms of thought, which is why Vervaeke wants to salvage gnosis without gnosticism.","passages":[]}],"commonConfusions":["Gnosticism is not a single organized religion, Vervaeke presents it as a style or movement (like existentialism or fundamentalism) that pervades early Christianity without constituting a distinct community.","Gnosis (the transformative knowing) and gnosticism (the historical movement with its mythology) must be distinguished, Vervaeke wants to recover the former while being critical of the latter's tendency toward conspiracy and antisemitism.","The Gnostic mythology, however bizarre, is not meant literally, it is a mythological scaffolding for the existential experience of feeling trapped and seeking liberation through participatory knowing."],"keyPassages":[{"episode":18,"phrase":"I'm presenting the Gnostic movement as the axial revolution within the axial revolution. It's taking the revolution to its culmination in many important ways that I think have direct relevance for us today.","role":"definition"},{"episode":18,"phrase":"gnosticism as Hans Jonas and other people have seen is directly relevant to a lot of the modern confrontation with meaninglessness and nihilism because in the meaning crisis, people also similarly feel deeply, existentially trapped.","role":"application"}]},{"id":"having-mode-being-mode","canonicalName":"having-mode and being-mode","aliases":["having mode","being mode","having vs being"],"definition":"Fromm's two existential modes: the having-mode meets having-needs by categorizing, controlling, and possessing (I-it relations); the being-mode meets being-needs by becoming, developing, and participating (I-thou relations), confusion between them is modal confusion.","sourcePassage":{"episode":7,"quote":"They're \"having needs\" and \"being needs\". So of course this mode (having needs) is called \"having mode\". It's an existential mode."},"depth":2,"cluster":"normative","introducedIn":7,"developedIn":[8,9,13],"appliedIn":[11,14,15,33,38,39,47],"prerequisites":["existential-mode"],"relatedConcepts":["modal-confusion","mindfulness","existential-mode"],"contrastedWith":["modal-confusion"],"associatedPeople":["fromm","buber","stephen-batchelor"],"isFlagship":false,"notes":"Vervaeke argues capitalism systematically trains us into modal confusion to sell us being-mode goods (love, maturity) as having-mode commodities (cars, sex).","subConcepts":[{"id":"having-mode-defined","name":"The having-mode and its needs","summary":"The having-mode meets 'having-needs' by categorising, controlling, and possessing objects, it operates in I-it relations and is appropriate for managing the material world.","passages":[{"episode":7,"phrase":"They're \"having needs\" and \"being needs\". So of course this mode (having needs) is called \"having mode\". It's an existential mode."}]},{"id":"being-mode-defined","name":"The being-mode and its needs","summary":"The being-mode meets 'being-needs', for love, maturity, meaning, through becoming, developing, and participating in I-thou relations that cannot be reduced to acquisition.","passages":[{"episode":7,"phrase":"This process by which you are co-identifying agency and arena so that they fit together and make sense of each other and you get a coherent and functioning world view... That's your existential mode."}]},{"id":"modal-confusion-capitalism","name":"Modal confusion in market culture","summary":"Capitalism systematically trains people into modal confusion by selling being-needs, love, identity, maturity, as having-mode commodities like cars and status symbols.","passages":[{"episode":7,"phrase":"Fromm's point is we get mixed up. We try to satisfy our being needs within the having mode. We suffer from \"Modal Confusion\"."}]}],"commonConfusions":["The being-mode is not opposed to action or engagement, it is a different way of engaging, characterised by becoming rather than acquiring.","Vervaeke does not say having-needs are bad, both modes are legitimate; the problem is modal confusion, not the having-mode itself.","Sati (mindfulness) is Vervaeke's psycho-technological remedy for modal confusion, it recovers the being-mode, not by ignoring having-needs but by properly situating them."],"keyPassages":[{"episode":7,"phrase":"They're \"having needs\" and \"being needs\". So of course this mode (having needs) is called \"having mode\". It's an existential mode.","role":"definition"},{"episode":7,"phrase":"Fromm's point is we get mixed up. We try to satisfy our being needs within the having mode. We suffer from \"Modal Confusion\".","role":"application"},{"episode":13,"phrase":"It helps you to remember The Being Mode, to get out of Modal Confusion.","role":"application"}]},{"id":"higher-states-of-consciousness","canonicalName":"higher states of consciousness","aliases":["HSC","awakening experience","mystical experience"],"definition":"A subset of altered states experienced as more real than ordinary reality, accompanied by clarity, oneness, ineffability, inner peace, and the demand to transform one's whole life accordingly, characterized by ontonormativity and serving as a guide for radical transformative experience.","sourcePassage":{"episode":10,"quote":"reliably what is characteristic of these states is that people find them to be really real and and in both directions: Arena and Agent."},"depth":4,"cluster":"cognitive-science","introducedIn":10,"developedIn":[11,12,33,34,35],"appliedIn":[9,13,17,18,36,37,38,39,45,48],"prerequisites":["altered-states-of-consciousness","consciousness"],"relatedConcepts":["transformative-experience","ontonormativity","the-sacred","flow","anagoge"],"contrastedWith":[],"associatedPeople":["newberg","yaden","steve-taylor","william-james"],"isFlagship":true,"notes":"30-40 percent of the population reports having had such experiences. Vervaeke argues their rational justification lies not in propositional content but in optimizing the plausibility machinery of relevance realization.","subConcepts":[{"name":"ineffability","description":"Higher states resist propositional capture; participants consistently describe them as beyond language and ordinary categorization.","keyPassages":[{"episode":10,"phrase":"I call this the problem of the 'Ontonormativity.' Remember that 'ontology' has to do with the structure of reality. Normative is when things are placing a demand on you to be better, to improve.","role":"qualification"}],"passages":[]},{"name":"systematic-insight","description":"Higher states afford insight not just into a particular problem but into the framing process itself, a transframing that transforms the capacity for relevance realization.","keyPassages":[{"episode":40,"phrase":"it not only is reframing the problem. It is transforming my competence so it is a transframing insight. It is a systematic insight.","role":"exemplar"}],"passages":[]},{"name":"gnosis-empowerment","description":"Higher states of consciousness function as the engine that empowers the participatory transformation (gnosis) required to overcome existential entrapment.","keyPassages":[{"episode":38,"phrase":"we can respond to existential entrapment by the cultivation of gnosis, which can be empowered by a core capacity for realizing higher states of consciousness","role":"definition"}],"passages":[]}],"commonConfusions":["Higher states of consciousness are not merely more intense versions of normal experience, they involve a qualitative restructuring of the salience landscape and the sense of self.","They are not automatically veridical, their epistemic value depends on whether the insight they afford survives critical integration with waking cognition.","Higher states are not restricted to drug-induced experiences; flow, deep meditation, and ritual practice can all occasion them."],"keyPassages":[{"episode":10,"phrase":"The core function of consciousness seems to be to help you realize, become aware of, actualize, put into action, 'Relevance': relevant information.","role":"definition"},{"episode":10,"phrase":"I call this the problem of the 'Ontonormativity.' Remember that 'ontology' has to do with the structure of reality. Normative is when things are placing a demand on you to be better, to improve.","role":"qualification"},{"episode":38,"phrase":"we can respond to existential entrapment by the cultivation of gnosis, which can be empowered by a core capacity for realizing higher states of consciousness","role":"application"},{"episode":29,"phrase":"people claim to have the most profound sense of meaning and it is precisely ineffable. They reliably, across traditions, across historical contexts, claim that it is not conceptual, it can't be grasped categorically and they use the language of hereness and nowness to describe it","role":"exemplar"}]},{"id":"horror","canonicalName":"horror","aliases":[],"definition":"Not the fright of horror movies but the existential experience in which one's sense of grip on reality itself is undermined, when the very framing capacity by which one makes any sense is threatened, for Vervaeke a key marker of the depth of certain experiences and a function of the sacred is to home us against.","sourcePassage":{"episode":1,"quote":"Most horror movies aren't horror. We'll talk about what horror really is and what people experience when they're actually experiencing horror. Their sense of grip on reality is being undermined and people find that, as you can imagine, terrifying."},"depth":3,"cluster":"normative","introducedIn":1,"developedIn":[33,34],"appliedIn":[11,22,26,38,39,46],"prerequisites":[],"relatedConcepts":["the-sacred","the-numinous","absurdity","domicide"],"contrastedWith":["worldview-attunement","the-sacred"],"associatedPeople":["otto","geertz"],"isFlagship":false,"notes":"Vervaeke connects horror to Otto's account of the numinous as terrifying, and to Geertz's idea that sacredness homes us against horror.","subConcepts":[],"commonConfusions":["Horror is not fright or fear, Vervaeke sharply distinguishes horror (the grip on reality itself being undermined) from the fear of a specific threat where you know what to do.","Most horror movies are not horror in Vervaeke's technical sense, they produce fright, not the existential destabilisation in which framing capacity itself is threatened.","Horror and the sacred are not opposites, the numinous experience of the sacred edges on horror, because both involve the transgression of one's framing by something larger."],"keyPassages":[{"episode":1,"phrase":"Most horror movies aren't horror. We'll talk about what horror really is and what people experience when they're actually experiencing horror. Their sense of grip on reality is being undermined and people find that, as you can imagine, terrifying.","role":"definition"},{"episode":33,"phrase":"wonder, think about awe (writes these on the board, Awe above Wonder) and what we've been talking about and this remembering of the Being mode - which is so central to spirituality, right? So that's another aspect of this.","role":"qualification"},{"episode":33,"phrase":"one of the functions of sacredness is the Meta-Meaning process of homing us against horror (Meta-Meaning => Sacredness => Homing Against Horror) where horror would be to be overwhelmed by loneliness.","role":"application"}]},{"id":"hyperbolic-discounting","canonicalName":"hyperbolic discounting","aliases":["temporal discounting"],"definition":"The cross-species adaptive mechanism that reduces the salience of distant, low-probability events, adaptive in keeping cognition tractable but a key driver of self-deceptive self-destructive behavior (smoking, procrastination) by making abstract long-term consequences invisible.","sourcePassage":{"episode":13,"quote":"It's like when we talked about hyperbolic discounting. You can't do without them. They're adaptive. You need them."},"depth":3,"cluster":"cognitive-science","introducedIn":5,"developedIn":[5,6],"appliedIn":[7,13,23],"prerequisites":["salience-landscape"],"relatedConcepts":["salience-landscape","self-deception","parasitic-processing","akrasia"],"contrastedWith":[],"associatedPeople":["plato"],"isFlagship":false,"notes":"Vervaeke's recurring example of the 'adaptive machinery that makes us prey to self-deception', the same cognitive structure that makes us viable also enables the cigarette-smoker's blindness.","subConcepts":[],"commonConfusions":["Hyperbolic discounting is not irrational laziness; it is a structural bias in the temporal weighting of value built into the relevance-realization machinery.","It is not fixed or immutable, practices that cultivate expanded temporal horizons (such as wisdom cultivation) can partially counteract hyperbolic discounting."],"keyPassages":[{"episode":13,"phrase":"We get into all kinds of these spirals.","role":"exemplar"},{"episode":38,"phrase":"the very processes that make us intelligently adaptive also make us vulnerable to self-deceptive, self-destructive behavior","role":"definition"}]},{"id":"implicit-learning","canonicalName":"implicit learning","aliases":[],"definition":"The non-conscious pickup of complex statistical patterns in the environment without explicit awareness of the rules, the cognitive mechanism behind intuition, expertise, and the participatory knowing that flow makes possible.","sourcePassage":{"episode":2,"quote":"This has to do with your capacity for implicit learning. Now notice what's happening here. Notice that, although even I'm doing the history, I'm always also doing the 'cog-psy' because while I've been emphasizing the history, the historical account, I'm starting to build what I need to give you the structural functional account."},"depth":2,"cluster":"cognitive-science","introducedIn":2,"developedIn":[2,8,9,11,30],"appliedIn":[13,32,45],"prerequisites":[],"relatedConcepts":["flow","participatory-knowing","procedural-knowing"],"contrastedWith":["propositional-knowing"],"associatedPeople":["arthur-reber","robin-hogarth"],"isFlagship":false,"notes":"Reber's 1960s work on artificial-grammar learning is the empirical foundation. Hogarth's 'educating intuition' argument extends this: intuition is the felt sense of implicit-learning output, not anything magical.","subConcepts":[],"commonConfusions":["Implicit learning is not the same as unconscious bias, it is a genuine pattern-tracking capacity that can pick up on real causal structures, not only correlational artifacts.","Intuition produced by implicit learning is not magical; it is the surface expression of complex pattern recognition that cannot be fully articulated.","Explicit instruction does not improve implicit learning, it interferes with it; the relevant intervention is arranging the right environmental conditions (clear feedback, tight coupling, consequential error)."],"keyPassages":[{"episode":2,"phrase":"you have this tremendous capacity outside your conscious awareness - to pick up on very complex patterns in your environment. You say 'OK, why? What does this have to do with shamanism?'","role":"definition"},{"episode":2,"phrase":"those three criteria that will turn your intuition into good implicit learning are exactly the conditions for flow. Clear information. Tightly coupled feedback. And error matters.","role":"definition"}]},{"id":"inner-conflict","canonicalName":"inner conflict","aliases":[],"definition":"The experience of having two strong motives working against each other, divided against oneself in a way that fuses with existential meaning, anxiety, and the sense of being stuck; the phenomenon Plato's tripartite psyche is designed to explain.","sourcePassage":{"episode":5,"quote":"Inner conflict is when you have two strong motives that seem to be working against each other and you can see how this is immediately going to be relevant to existential meaning - to meaning in life because very often we feel most distraught, most anxious, or the most sense of being stuck when we have such inner conflict."},"depth":2,"cluster":"cognitive-science","introducedIn":5,"developedIn":[5,6,7,17],"appliedIn":[13,23,47],"prerequisites":[],"relatedConcepts":["akrasia","self-deception","modal-confusion","the-platonic-project"],"contrastedWith":[],"associatedPeople":["plato"],"isFlagship":false,"notes":"Plato's tripartite psyche (reason / spirit / appetite) is the framework Vervaeke uses to make inner conflict cognitively tractable; akrasia and self-deception are its named failure modes.","subConcepts":[],"commonConfusions":["Inner conflict is not simply wanting two incompatible things; it arises from competing relevance-realization processes pulling the agent toward different agent-arena configurations.","Resolving inner conflict is not a matter of rational deliberation alone, it requires addressing the participatory and perspectival sources of the conflict."],"keyPassages":[{"episode":13,"phrase":"We called this in, when we published, 'Parasitic Processing'. It's not just about bad events. This is just one example. We get into all kinds of these spirals.","role":"exemplar"},{"episode":38,"phrase":"the very processes that make us intelligently adaptive also make us vulnerable to self-deceptive, self-destructive behavior","role":"definition"},{"episode":7,"phrase":"Fromm's point is we get mixed up. We try to satisfy our being needs within the having mode. We suffer from 'Modal Confusion'.","role":"exemplar"},{"episode":40,"phrase":"at the core of wisdom is the capacity for overcoming self-deception","role":"application"},{"episode":9,"phrase":"I have to break up an inappropriate frame. What do I have to do? I have to break up the gestalt. And I also have to de-automatize my cognition.","role":"application"}]},{"id":"insight","canonicalName":"insight","aliases":["aha experience","the aha"],"definition":"A sudden restructuring of cognition in which an inappropriate frame is broken and a better frame is constructed, disrupting an automatized pattern via scaling down and rebuilding a larger pattern via scaling up, yielding a 'flash' of consciousness and a new way of seeing.","sourcePassage":{"episode":9,"quote":"I have to break up an inappropriate frame. What do I have to do? I have to break up the gestalt. And I also have to de-automatize my cognition."},"depth":3,"cluster":"cognitive-science","introducedIn":1,"developedIn":[2,8,9,10,11,32],"appliedIn":[12,13,17,22,28,29,33,38,40,42,45],"prerequisites":["salience-landscape"],"relatedConcepts":["transframing","relevance-realization","flow","consciousness","mindfulness"],"contrastedWith":[],"associatedPeople":["polanyi"],"isFlagship":true,"notes":"Vervaeke distinguishes insight in consciousness (re-framing one problem) from insight of consciousness (systematic restructuring of one's whole salience landscape, the basis of higher states of consciousness and developmental change).","subConcepts":[{"name":"frame-breaking","description":"The first phase of insight in which an inappropriate representational frame (gestalt) is disrupted, de-automatizing cognition.","keyPassages":[{"episode":9,"phrase":"I have to break up an inappropriate frame. What do I have to do? I have to break up the gestalt. And I also have to de-automatize my cognition.","role":"definition"}],"passages":[]},{"name":"insight-cascade","description":"The extended flow of successive insight events that characterizes deep learning, each restructuring primes the next.","keyPassages":[{"episode":2,"phrase":"That's the flow state. It's an insight cascade. So the more you flow, the more you're training your ability for insight.","role":"definition"}],"passages":[]},{"name":"transframing-insight","description":"A systematic insight that does not merely reframe a single problem but transforms the competence that generates frames, characteristic of wisdom development.","keyPassages":[{"episode":40,"phrase":"it not only is reframing the problem. It is transforming my competence so it is a transframing insight. It is a systematic insight.","role":"definition"}],"passages":[]}],"commonConfusions":["Insight is not merely a lucky guess, it requires first breaking an inappropriate frame and then restructuring how features cohere.","Insight cannot be forced by deliberate logical search; the de-automatization that enables it often requires indirect practices like mindfulness or flow.","Insight into a single problem is distinct from the systematic, transframing insight associated with wisdom, which transforms whole competences rather than individual solutions."],"keyPassages":[{"episode":9,"phrase":"I have to break up an inappropriate frame. What do I have to do? I have to break up the gestalt. And I also have to de-automatize my cognition.","role":"definition"},{"episode":9,"phrase":"Mindfulness is basically teaching us how to appropriate and train a flexibility of attentional scaling so that we can intervene effectively in how we are framing our problems and increase the chances of insight when insight is needed.","role":"application"},{"episode":8,"phrase":"attention isn't a spotlight. It's a very complex optimisation process.","role":"qualification"},{"episode":2,"phrase":"That's the flow state. It's an insight cascade. So the more you flow, the more you're training your ability for insight.","role":"application"},{"episode":40,"phrase":"it not only is reframing the problem. It is transforming my competence so it is a transframing insight. It is a systematic insight.","role":"exemplar"}]},{"id":"kairos","canonicalName":"kairos","aliases":["the right time","turning point"],"definition":"The crucial right-timed moment in a course of events, a turning point at which one can intervene to redirect the unfolding story, central to the Hebraic narrative ordering of time and personalized in Christianity through the figure of Jesus.","sourcePassage":{"episode":3,"quote":"there's a technical term for these turning points: Kairos. It's developed by the theologian Paul Tulloch. This is this sense of the crucial turning point."},"depth":2,"cluster":"historical","introducedIn":3,"developedIn":[15,16,24],"appliedIn":[4,17,19,22,25,39,47],"prerequisites":[],"relatedConcepts":["metanoia","narrative-order","daath"],"contrastedWith":[],"associatedPeople":["tillich","jesus-of-nazareth"],"isFlagship":false,"notes":"Tillich's notion; Vervaeke ties Kairos to a participatory perspectival knowing of when in the unfolding course of events transformative action is possible.","subConcepts":[{"id":"kairos-in-narrative-order","name":"Kairos within narrative order","summary":"In the Hebraic tradition, Kairos moments are the turning points in the cosmic narrative at which God intervenes to redirect the course of history, and prophets are those who identify and proclaim these moments.","passages":[]},{"id":"kairos-personalized-in-christianity","name":"Kairos personalized in Christianity","summary":"Christianity radicalizes Kairos by claiming that the ultimate cosmic turning point is incarnated in a particular person, Jesus, making it possible for each individual to experience a personal Kairos through encounter with him.","passages":[{"episode":15,"phrase":"Jesus of Nazareth is actually the ultimate Kairos. That all the other Kairos were pointing to him and are summed up in him. That he represents the ultimate turning point."}]}],"commonConfusions":["Kairos is not the same as chronos, Vervaeke distinguishes the linear sequential flow of time (chronos) from the qualitative right moment of intervention (kairos) that is participatorily known, not calculated.","The prophet who identifies Kairos is not a fortune-teller, prophecy means 'telling forth' (waking people up to how they are off course right now), not predicting future events, and the therapist is a better modern analogy than the psychic.","Kairos is not only a religious concept in Vervaeke's framework, it reappears in Relevance Realization as temporality (centrality in time), making it a structural feature of all meaningful cognition."],"keyPassages":[{"episode":3,"phrase":"Now, there's a technical term for these turning points: Kairos. It's developed by the theologian Paul Tulloch. This is this sense of the crucial turning point.","role":"definition"},{"episode":3,"phrase":"When you're making love with somebody you are participating in them. You're identifying with them, empathizing with them, resonating with them. You are changing them as they are changing you and it - Forgive me the pun - to a climax! To a turning point to a resolution.","role":"exemplar"},{"episode":15,"phrase":"Jesus of Nazareth is actually the ultimate Kairos. That all the other Kairos were pointing to him and are summed up in him.","role":"application"}]},{"id":"logos","canonicalName":"logos","aliases":["the Logos"],"definition":"The Greek term for the intelligible structural-functional organization that makes a thing what it is and that makes it knowable, picked up in the Gospel of John as God's creative principle of intelligibility incarnated in Jesus.","sourcePassage":{"episode":5,"quote":"The Greeks have a good word for this (S-FO): the word \"logos\", although a word that's being discussed a lot today. I think it needs to be discussed a little bit more carefully."},"depth":2,"cluster":"historical","introducedIn":5,"developedIn":[6,15,16,50],"appliedIn":[7,18,19,47],"prerequisites":[],"relatedConcepts":["mythos","structural-functional-organization"],"contrastedWith":["mythos"],"associatedPeople":["plato","aristotle","john-evangelist"],"isFlagship":false,"notes":"Logos and mythos are not opposed in Vervaeke's account but complementary; their severance in modernity is part of the meaning crisis.","subConcepts":[{"id":"logos-as-structural-functional-organization","name":"Logos as structural-functional organization","summary":"In its original Greek sense, logos names the intelligible pattern, the structural-functional organization, that makes something be what it is and that the mind can take on in knowing it.","passages":[{"episode":5,"phrase":"The Germans have a great word for this - 'Gestalt'. In English we don't! The Greeks have a good word for this (S-FO): the word 'logos'."}]},{"id":"logos-in-christianity","name":"Logos in the Gospel of John","summary":"The Gospel of John appropriates the Stoic and Greek concept of logos to identify God's creative intelligibility principle with a particular person, Jesus, making Kairos and logos coincide in a historical individual.","passages":[]}],"commonConfusions":["Logos does not mean 'word' in the ordinary sense, it means the intelligible structural-functional organization (what makes a bird a bird), and its use as 'word' in the Gospel of John carries the full freight of its Greek philosophical sense.","Logos and mythos are not opposites in Vervaeke's account, they are complementary; logos gives the rational articulation of what mythos enacts participatorily, and their severance in modernity is a driver of the meaning crisis."],"keyPassages":[{"episode":5,"phrase":"The Greeks have a good word for this (S-FO): the word 'logos', although a word that's being discussed a lot today. I think it needs to be discussed a little bit more carefully.","role":"definition"},{"episode":5,"phrase":"this logos, this real pattern, is not only how you know something but it's also the pattern that makes it be what it is.","role":"exemplar"},{"episode":15,"phrase":"Logos doesn't mean just spoken words. It means like the intelligibility, the formative principle, the underlying structure.","role":"application"},{"episode":5,"phrase":"That form, that logos, is not only how the thing is integrated together, it's how your mind can be integrated with it.","role":"summary"}]},{"id":"metanoia","canonicalName":"metanoia","aliases":["radical conversion","being born again (technical)"],"definition":"A radical perspectival and participatory turning, meta- (beyond) and noia (noticing), a fundamental transformation of one's salience landscape and modal existence, the kind of awakening Jesus and Paul speak of in the language of being born again.","sourcePassage":{"episode":15,"quote":"NOIA means \"noticing\"; this is your perspectival awareness and \"Meta\" means \"beyond\". This means a \"radical transformation in your salience landscape\", a \"radical transformation of what it's like to be you\"."},"depth":3,"cluster":"normative","introducedIn":15,"developedIn":[16,17,18,19],"appliedIn":[22,38,39,50],"prerequisites":["salience-landscape","perspectival-knowing"],"relatedConcepts":["kairos","agape","transformative-experience","gnosis"],"contrastedWith":[],"associatedPeople":["jesus-of-nazareth","paul"],"isFlagship":false,"notes":"Mistranslated by 'conversion' in standard Bible translations. The Christian psycho-technology for personal Kairos.","subConcepts":[{"id":"metanoia-as-salience-revolution","name":"Metanoia as revolution of salience landscape","summary":"Metanoia is not a change of opinion but a radical transformation of one's entire perspectival landscape, what is salient, central, and real changes fundamentally.","passages":[{"episode":15,"phrase":"NOIA means \"noticing\"; this is your perspectival awareness and \"Meta\" means \"beyond\". This means a \"radical transformation in your salience landscape\", a \"radical transformation of what it's like to be you\"."}]},{"id":"metanoia-vs-conversion","name":"Metanoia versus mere 'conversion'","summary":"Standard Bible translations render metanoia as 'conversion', a mere change of allegiance, but the Greek means a transformation of the whole noetic field, closer to awakening than to switching sides.","passages":[{"episode":15,"phrase":"this word is much closer to \"awakening\"."}]}],"commonConfusions":["Metanoia is not a change of doctrinal belief, it is a perspectival and participatory transformation, not a propositional switch.","Being 'born again' is not a metaphor for joining a religious community, Jesus uses it for a radical shift in modal existence that can happen to anyone.","Metanoia is not instantaneous, it is the name for the turning, which can be sudden (like Paul on the road to Damascus) or gradual through practices."],"keyPassages":[{"episode":15,"phrase":"NOIA means \"noticing\"; this is your perspectival awareness and \"Meta\" means \"beyond\". This means a \"radical transformation in your salience landscape\", a \"radical transformation of what it's like to be you\".","role":"definition"},{"episode":16,"phrase":"Jesus is not only teaching this, he is exemplifying it. He experiences himself as a Kairos and he's giving to people through Agape the possibility of experiencing their own personal Kairos.","role":"application"}]},{"id":"mindfulness","canonicalName":"mindfulness","aliases":["sati"],"definition":"Not merely paying attention to the present moment, but a set of attentional psycho-technologies, combining scaling down (meditation, Vipassana) and scaling up (contemplation, Metta), that develop the cognitive flexibility for insight by allowing one to break inappropriate frames and construct better ones, and ultimately to recover the being-mode.","sourcePassage":{"episode":9,"quote":"Mindfulness is basically teaching us how to appropriate and train a flexibility of attentional scaling so that we can intervene effectively in how we are framing our problems and increase the chances of insight when insight is needed."},"depth":3,"cluster":"practical","introducedIn":1,"developedIn":[8,9,10,11],"appliedIn":[13,36,38,40,45],"prerequisites":["attention","salience-landscape"],"relatedConcepts":["having-mode-being-mode","insight","flow"],"contrastedWith":[],"associatedPeople":["siddhartha-gautama","stephen-batchelor","ellen-langer"],"isFlagship":false,"notes":"Vervaeke distinguishes the language of training (used pedagogically by mindfulness teachers) from the language of explaining (cognitive science). He converts mindfulness's feature list into a feature schema.","subConcepts":[{"id":"sati-as-remembering-being-mode","name":"Sati: remembering the being-mode","summary":"The original Pali meaning of mindfulness (sati) is not paying attention to the present moment but re-membering, recovering, the being-mode of existence, which modal confusion causes us to forget.","passages":[{"episode":8,"phrase":"Siddhārtha is trying to remember (writes sati on the board) the being mode. It's in the eyes of the renouncer."}]},{"id":"attentional-scaling-flexibility","name":"Attentional scaling and cognitive flexibility","summary":"Mindfulness trains the capacity to scale attention both up (contemplation, Metta) and down (meditation, Vipassana) and to flow between them, producing the cognitive flexibility needed for insight and frame-breaking.","passages":[{"episode":9,"phrase":"Mindfulness is basically teaching us how to appropriate and train a flexibility of attentional scaling so that we can intervene effectively in how we are framing our problems and increase the chances of insight when insight is needed."}]},{"id":"opponent-processing-in-mindfulness","name":"Opponent processing: meditation and contemplation","summary":"Mindfulness is not synonymous with meditation alone; it coordinates meditation (scaling down, de-automating) and contemplation (scaling up, making new patterns) in opponent processing so that optimal attentional grip is dynamically maintained.","passages":[{"episode":9,"phrase":"you want to train people in both of these skills and then train them to flow between them. It's called 'oponent processing'. So they're pulling and pushing on each other and so they're forced to coordinate and constantly get the right degree of attentional engagement"}]}],"commonConfusions":["Mindfulness is not simply paying attention to the present moment in a non-judgmental way; Vervaeke insists this pedagogical language conceals the explanatory mechanism, which is attentional scaling flexibility for increasing insight.","Mindfulness is not synonymous with meditation; meditation (scaling down) is only one half; contemplation (scaling up) is equally essential, and the coordination between them is what produces cognitive flexibility.","Sati does not mean mere present-moment awareness; it means recovering the being-mode of participatory existence that modal confusion causes us to forget.","Mindfulness is not a relaxation technique; its core function is to increase the probability of insight by training the capacity to break and rebuild frames."],"keyPassages":[{"episode":8,"phrase":"Siddhārtha is trying to remember (writes sati on the board) the being mode. It's in the eyes of the renouncer.","role":"definition"},{"episode":9,"phrase":"Mindfulness is basically teaching us how to appropriate and train a flexibility of attentional scaling so that we can intervene effectively in how we are framing our problems and increase the chances of insight when insight is needed.","role":"definition"},{"episode":9,"phrase":"you want to train people in both of these skills and then train them to flow between them. It's called 'oponent processing'. So they're pulling and pushing on each other","role":"exemplar"},{"episode":38,"phrase":"we can address modal confusion by the cultivation of Sati.","role":"application"},{"episode":9,"phrase":"you shouldn't equate mindfulness just with meditation. It's not. So if you pay attention, for example, to the eight fold path you'll have people being trained in meditative practices, contemplative practices, practices in which you flow between the opposites","role":"qualification"}]},{"id":"modal-confusion","canonicalName":"modal confusion","aliases":[],"definition":"The systematic conflation of being-needs with having-needs, trying to satisfy needs for love, maturity, or meaning through acquiring things rather than becoming someone, endemic in market cultures and central to existential suffering.","sourcePassage":{"episode":7,"quote":"Fromm's point is we get mixed up. We try to satisfy our being needs within the having mode. We suffer from \"Modal Confusion\"."},"depth":3,"cluster":"cognitive-science","introducedIn":7,"developedIn":[8,9,13],"appliedIn":[11,14,17,18,22,38,39,46],"prerequisites":["having-mode-being-mode"],"relatedConcepts":["parasitic-processing","self-deception","having-mode-being-mode"],"contrastedWith":["mindfulness"],"associatedPeople":["fromm","stephen-batchelor"],"isFlagship":true,"notes":"Distinct from but related to parasitic processing. Vervaeke links modal confusion to addiction (Marc Lewis's reciprocal narrowing) and to the commercialization of identity.","subConcepts":[{"name":"having-mode","description":"An existential orientation toward the world as a set of possessions or objects to be acquired and controlled.","keyPassages":[{"episode":7,"phrase":"Fromm's point is we get mixed up. We try to satisfy our being needs within the having mode. We suffer from 'Modal Confusion'.","role":"definition"}],"passages":[]},{"name":"being-mode","description":"An existential orientation of participation, engagement, and identity-transformation rather than acquisition.","keyPassages":[{"episode":7,"phrase":"Fromm's point is we get mixed up. We try to satisfy our being needs within the having mode. We suffer from 'Modal Confusion'.","role":"definition"}],"passages":[]}],"commonConfusions":["Modal confusion is not simply a cognitive error about facts; it is an existential misalignment between the mode of engagement and the need being pursued.","Having-mode engagement is not inherently wrong, the problem arises only when being-mode needs are pursued through having-mode strategies."],"keyPassages":[{"episode":7,"phrase":"Fromm's point is we get mixed up. We try to satisfy our being needs within the having mode. We suffer from 'Modal Confusion'.","role":"definition"},{"episode":38,"phrase":"We can address modal confusion by the cultivation of Sati.","role":"application"},{"episode":7,"phrase":"This process by which you are co-identifying agency and arena so that they fit together and make sense of each other and you get a coherent and functioning world view... That's your existential mode.","role":"exemplar"},{"episode":13,"phrase":"We get into all kinds of these spirals.","role":"application"}]},{"id":"mythos","canonicalName":"mythos","aliases":["myth (technical sense)"],"definition":"Not falsehood about the past but the integrated structure of symbol, story, and ritual that activates, accentuates, articulates, and celebrates religio, patterns of representation that are simultaneously patterns of interaction enabling transformation.","sourcePassage":{"episode":3,"quote":"myths aren't false stories about the ancient past. They're symbolic stories about perennial patterns that are always with us."},"depth":3,"cluster":"normative","introducedIn":2,"developedIn":[3,5,13,17,24,34,35,39,46],"appliedIn":[4,7,8,15,16,18,19,20,23,25,36,37,38,47,48,49,50],"prerequisites":[],"relatedConcepts":["the-symbol","religio","the-sacred","ritual","logos"],"contrastedWith":["logos"],"associatedPeople":["jung","tillich"],"isFlagship":false,"notes":"Vervaeke uses 'mythos' deliberately, distinguishing it from 'myth' in the colloquial sense. Mythos integrates symbol, story, and ritual into a single enactive system.","subConcepts":[{"id":"mythos-as-perennial-pattern","name":"Mythos as perennial pattern, not past fable","summary":"Myths are not false stories about the ancient past but symbolic stories about patterns that are perennially present, they operate at the level of perennial human structure.","passages":[{"episode":3,"phrase":"myths aren't false stories about the ancient past. They're symbolic stories about perennial patterns that are always with us."}]},{"id":"mythos-as-religio-activator","name":"Mythos as activator of religio","summary":"Mythos, the integrated structure of symbol, story, and ritual, is the means by which a community activates, accentuates, articulates, and celebrates its religio.","passages":[{"episode":36,"phrase":"We can use Mythos to activate, accelerate, articulate, and appreciate Religio."}]}],"commonConfusions":["Myth does not mean false, for Vervaeke, 'myth' in the technical sense means a story about a perennial pattern, not a factual claim about history.","Mythos and logos are not opposed, they are complementary; their severance in modernity (not their distinction) is part of the problem.","Mythos is not reducible to narrative alone, it integrates symbol and ritual together with story into a single enactive system."],"keyPassages":[{"episode":3,"phrase":"myths aren't false stories about the ancient past. They're symbolic stories about perennial patterns that are always with us.","role":"definition"},{"episode":36,"phrase":"We can use Mythos to activate, accelerate, articulate, and appreciate Religio. Religio is inherently valuable to us so even that alone is going to be very valuable to us.","role":"application"}]},{"id":"mythos-vs-logos","canonicalName":"mythos vs logos","aliases":["mythos and logos"],"definition":"The distinction and interdependence between mythos (symbolic, ritual, participatory patterns that articulate meaning) and logos (the rational, articulated structural-functional organization of intelligibility), both needed; their severance is one cause of the meaning crisis.","sourcePassage":{"episode":5,"quote":"The Greeks have a good word for this (S-FO): the word \"logos\", although a word that's being discussed a lot today. I think it needs to be discussed a little bit more carefully."},"depth":3,"cluster":"normative","introducedIn":5,"developedIn":[15,16,24,35,46,50],"appliedIn":[3,6,18,20,39,47],"prerequisites":["mythos"],"relatedConcepts":["mythos","logos","religio"],"contrastedWith":[],"associatedPeople":["plato","jesus-of-nazareth","john-evangelist","hegel"],"isFlagship":true,"notes":"John's gospel ('in the beginning was the Logos') and Hegel's translation of mythos into philosophy illustrate the convergence; the modern severance leaves logos without existential transformative relevance.","subConcepts":[{"id":"logos-as-structural-intelligibility","name":"Logos as structural-functional intelligibility","summary":"Logos is the rational articulation of the structural-functional organisation of reality, the pattern that makes things intelligible, distinct from mere spoken words.","passages":[{"episode":5,"phrase":"The Greeks have a good word for this (S-FO): the word \"logos\", although a word that's being discussed a lot today. I think it needs to be discussed a little bit more carefully."}]},{"id":"severance-of-mythos-logos","name":"The modern severance of mythos and logos","summary":"Modernity severed mythos from logos, leaving logos without existential relevance and mythos without rational grounding, and this severance is a driving cause of the meaning crisis.","passages":[{"episode":16,"phrase":"Christianity is going to take up into itself the Stoicism we've already talked about. Paul quotes stoicism in the Bible."}]}],"commonConfusions":["Logos does not simply mean 'word', for Vervaeke following John and the Stoics, it means the intelligible formative principle structuring reality.","The problem is not the distinction between mythos and logos but their modern severance, they are supposed to be complementary, not rivals.","John's gospel ('In the beginning was the Logos') is appropriating a Stoic concept to identify God's creative rationality with the intelligibility of Jesus, showing how mythic and logocentric thinking can converge."],"keyPassages":[{"episode":5,"phrase":"The Greeks have a good word for this (S-FO): the word \"logos\", although a word that's being discussed a lot today. I think it needs to be discussed a little bit more carefully.","role":"definition"},{"episode":16,"phrase":"Christianity is going to take up into itself the Stoicism we've already talked about. Paul quotes stoicism in the Bible.","role":"exemplar"},{"episode":20,"phrase":"All of this was integrated together. These three orders that articulate the space of how we're connected to ourselves, to each other and to the world. The normal logical, the normative and the narrative","role":"summary"}]},{"id":"narrative-order","canonicalName":"narrative order","aliases":[],"definition":"The Hebraic-Christian order of meaning by which history is structured as a cosmic story with crucial turning points (Kairos), participatory faith (Da'ath), moral progress, and an open future co-created with God, what gives Western life its sense of personal journey.","sourcePassage":{"episode":20,"quote":"All of this was integrated together. These three orders that articulate the space of how we're connected to ourselves, to each other and to the world. The normal logical, the normative and the narrative"},"depth":3,"cluster":"normative","introducedIn":19,"developedIn":[20,21,22,23,24,25],"appliedIn":[3,15,16,17,18,39,46],"prerequisites":["kairos"],"relatedConcepts":["nomological-order","normative-order","kairos","daath","the-axial-revolution"],"contrastedWith":["continuous-cosmos"],"associatedPeople":["paul","augustine","tillich","hegel"],"isFlagship":false,"notes":"Marx secularizes the narrative order into political revolution; Hegel into the dialectic of Geist. The breakdown of the narrative order is also part of the meaning crisis.","subConcepts":[{"id":"narrative-order-as-cosmic-story","name":"Narrative order as structured cosmic story","summary":"The Hebraic narrative order gives history a directional structure, from slavery to promised land, from fall to redemption, with kairos moments where human participation shapes the outcome.","passages":[{"episode":20,"phrase":"All of this was integrated together. These three orders that articulate the space of how we're connected to ourselves, to each other and to the world. The normal logical, the normative and the narrative"}]},{"id":"narrative-order-secularisation","name":"Secularisation of narrative order","summary":"Hegel translates narrative order into the dialectic of Geist; Marx into political revolution, both preserve the narrative structure while stripping the cosmic dimension.","passages":[{"episode":15,"phrase":"this whole idea of co-creating with God the open future, such that we can bring about a promised land for human beings."}]}],"commonConfusions":["Narrative order is not mere storytelling, it is the participatory structure of reality as co-created history, requiring Da'ath (participatory faith) to inhabit.","Narrative order is not the same as having a personal autobiography, it is a cosmic structure that situates personal lives within a larger moral-historical arc.","The breakdown of narrative order is not just secularisation, it involves the loss of the sense that history has a meaningful direction in which human participation matters."],"keyPassages":[{"episode":20,"phrase":"All of this was integrated together. These three orders that articulate the space of how we're connected to ourselves, to each other and to the world. The normal logical, the normative and the narrative","role":"definition"},{"episode":15,"phrase":"this whole idea of co-creating with God the open future, such that we can bring about a promised land for human beings.","role":"exemplar"},{"episode":3,"phrase":"Faith was your sense that you are in this reciprocal realization: you're \"in course\". You're \"on course\". You're involved and evolving with things.","role":"application"}]},{"id":"neoplatonism","canonicalName":"neoplatonism","aliases":["neo-platonism","Plotinian Platonism"],"definition":"Plotinus's grand unification of Aristotle's worldview, Stoic therapy, and Platonic spirituality, a system in which levels of reality and levels of self ascend together, culminating in The One, and which would become the bedrock of Western spirituality.","sourcePassage":{"episode":18,"quote":"Plotinus is the grand unified field theory of ancient spirituality because what does he do? Well, he takes Plato's spirituality. He takes the whole idea of anagoge from Plato. He takes Aristotle's theory, the whole Aristotle worldview, the theory of knowing, the theory of the structure of the world."},"depth":3,"cluster":"historical","introducedIn":18,"developedIn":[19,20,22],"appliedIn":[21,23,24,36,39,47,49],"prerequisites":["the-platonic-project","anagoge"],"relatedConcepts":["the-one","anagoge","the-platonic-project","gnosticism"],"contrastedWith":[],"associatedPeople":["plotinus","augustine","eric-perl"],"isFlagship":false,"notes":"Versluis and others argue Neoplatonism is the bedrock of Western spirituality. Vervaeke uses it as the paradigm of integrated science-therapy-spirituality.","subConcepts":[{"id":"grand-unification-of-ancient-wisdom","name":"Grand unification of Platonic, Aristotelian, and Stoic strands","summary":"Plotinus synthesizes Plato's spirituality and anagoge, Aristotle's worldview and conformity theory, and Stoic therapeutic practice into a single integrated system in which science, therapy, and spirituality are mutually supporting.","passages":[{"episode":18,"phrase":"Plotinus is the grand unified field theory of ancient spirituality because what does he do? Well, he takes Plato's spirituality. He takes the whole idea of anagoge from Plato. He takes Aristotle's theory, the whole Aristotle worldview, the theory of knowing, the theory of the structure of the world."}]},{"id":"levels-of-reality-and-levels-of-self","name":"Levels of reality and levels of self ascending together","summary":"In Neoplatonism, as one conforms to progressively more integrated levels of reality, one simultaneously ascends to progressively more integrated levels of self, reality and self co-deepen anagogically.","passages":[]},{"id":"the-one-as-apex","name":"The One as inexhaustible apex","summary":"The apex of the Neoplatonic system is The One, that by which everything is real and everything is known, which cannot be known propositionally but can be reached through gnosis, being-at-one with it.","passages":[{"episode":18,"phrase":"Plotinus calls this The One. He doesn't mean the single. This is that by which reality is realized and our mind realizes reality."}]}],"commonConfusions":["Neoplatonism is not simply a religious movement, it is an integrated system of science, therapy, and spirituality that Vervaeke regards as the paradigm of their proper integration, against which their modern separation looks like a loss.","Plotinus's The One is not identical to the Christian God, it is impersonal, beyond all predication, and known only through a higher state of consciousness; Augustine's synthesis of Neoplatonism and Christianity required significant transformation of both.","Neoplatonism's levels of reality are not a literal ontological hierarchy, they are best understood as levels of integration and realness that both the world and the self ascend through in a participatory anagogic process."],"keyPassages":[{"episode":18,"phrase":"Plotinus is the grand unified field theory of ancient spirituality because what does he do? Well, he takes Plato's spirituality. He takes the whole idea of anagoge from Plato. He takes Aristotle's theory, the whole Aristotle worldview.","role":"definition"},{"episode":18,"phrase":"There is no deep division in Plotinus between spirituality, science, and therapy. They are all beautifully, mutually supporting, interwoven, enmeshed together. It's the culmination of everything from the Greek axial age.","role":"exemplar"},{"episode":18,"phrase":"You can't know it. You can't have it. You can't have it even in though. You can't have it even in the most beautiful theory. You can't have it. You can only be it.","role":"application"},{"episode":18,"phrase":"What makes something real is how one it is. How integrated it is. How much it is structurally, functionally organized.","role":"summary"}]},{"id":"nihilism","canonicalName":"nihilism","aliases":[],"definition":"The collapse of meaning-making after the death of the axial-age legacy, the experience that nothing has intrinsic value, no project is genuinely meaningful, and the cosmos is indifferent, diagnosed by Schopenhauer and Nietzsche and central to the meaning crisis.","sourcePassage":{"episode":23,"quote":"So here Romanticism very quickly passes into Schopenhauer (writes Schopenhauer on the board) who is the godfather of Nihilism"},"depth":2,"cluster":"historical","introducedIn":1,"developedIn":[23,24,25,46,47],"appliedIn":[18,22,26,39,50],"prerequisites":["the-meaning-crisis"],"relatedConcepts":["the-meaning-crisis","absurdity","the-prophets-of-the-meaning-crisis"],"contrastedWith":[],"associatedPeople":["schopenhauer","nietzsche","camus"],"isFlagship":false,"notes":"Vervaeke describes Schopenhauer as the godfather of nihilism and Nietzsche as the godfather of postmodernism, both are responses to the loss of axial-age meaning.","subConcepts":[],"commonConfusions":["Nihilism is not merely a philosophical position one can choose to adopt or reject, Vervaeke presents it as a cognitive-cultural pathology that arises historically when the machinery of meaning (nomological, normative, narrative order) breaks down.","Schopenhauer's nihilism is not the same as Nietzsche's nihilism, Schopenhauer is pessimistic (the will to live is meaningless), while Nietzsche proposes a response (will to power and self-transcendence), though Vervaeke argues Nietzsche's response ultimately fails.","Nihilism is not resolved by simply asserting meaning, because it is a pathology of the relevance realization machinery and worldview collapse, it requires the re-construction of nomological, normative, and narrative order."],"keyPassages":[{"episode":23,"phrase":"So here Romanticism very quickly passes into Schopenhauer (writes Schopenhauer on the board) who is the godfather of Nihilism","role":"definition"},{"episode":23,"phrase":"So for Schopenhauer it's this nihilism, it's this pessimism because he saw that once you remove the connection between Meaning Making and Rationality, you pay a very, very devastating price for it.","role":"exemplar"},{"episode":23,"phrase":"Romanticism and Nihilism, are actually deeply intertwined and closely related to each other. So think about that when Valentine's Day rolls around!","role":"application"},{"episode":46,"phrase":"the history of metaphysics, that whole philosophical history coming out of the axial revolution is actually the history of nihilism.","role":"qualification"}]},{"id":"nomological-order","canonicalName":"nomological order","aliases":["nomological-order"],"definition":"Vervaeke's term for a worldview in attunement that reliably affords existential modes in which agent and arena are well coupled, a cosmos in which intellectual understanding and existential dwelling converge, so individuals do not experience absurdity.","sourcePassage":{"episode":7,"quote":"I'm going to call that a \"Nomological Order\". Nomological Order comes from no \"Nomos(\\*\\*\\*\\*\\*)\", Law. This is what makes the universe law-like, not just in our current sense of scientific law but in the sense that it is a cosmos for us."},"depth":3,"cluster":"normative","introducedIn":7,"developedIn":[16,19,20,26],"appliedIn":[22,23,36,39,46],"prerequisites":["worldview-attunement","agent-arena-relationship"],"relatedConcepts":["normative-order","narrative-order","agent-arena-relationship","worldview-attunement"],"contrastedWith":["absurdity"],"associatedPeople":["aristotle"],"isFlagship":false,"notes":"One of three orders of meaning Vervaeke identifies, alongside the normative order (Plotinus/Platonism) and the narrative order (biblical-Hebraic). The breakdown of all three drives the meaning crisis.","subConcepts":[],"commonConfusions":["Nomological order is not just scientific natural law, it is a worldview in which the cosmos is intelligible for human dwelling, not merely mathematically describable.","Aristotle's world provided nomological order not because it was scientifically correct but because it integrated cosmic intelligibility with human existential modes.","The scientific revolution destroyed the Aristotelian nomological order without producing a successor, this is one root of the meaning crisis."],"keyPassages":[{"episode":7,"phrase":"I'm going to call that a \"Nomological Order\". Nomological Order comes from no \"Nomos(*****)\"Law. This is what makes the universe law-like, not just in our current sense of scientific law but in the sense that it is a cosmos for us.","role":"definition"},{"episode":7,"phrase":"what you have, when you have a world view, is you've got this Agent and Arena coupling.","role":"application"},{"episode":20,"phrase":"All of this was integrated together. These three orders that articulate the space of how we're connected to ourselves, to each other and to the world. The normal logical, the normative and the narrative","role":"summary"}]},{"id":"normative-order","canonicalName":"normative order","aliases":[],"definition":"The order of meaning by which we can ascend in levels of being and self-knowing, the Platonic and Neoplatonic order of anagoge, that places a demand on us to grow and self-transcend.","sourcePassage":{"episode":19,"quote":"From Plotinus himself, we get now what I'm going to call the Normative Order (writes Normative Order off of Plotinus and beside Aristotelian Worldview) . Plotinus gave us an account of how we can move in a coordinated fashion up the levels of reality, up the levels of consciousness, up the levels of the self, from what is less real to what is more real"},"depth":3,"cluster":"normative","introducedIn":19,"developedIn":[20,21,22,23],"appliedIn":[18,24,25,36,39,46],"prerequisites":["the-platonic-project","anagoge","neoplatonism"],"relatedConcepts":["nomological-order","narrative-order","anagoge","self-transcendence"],"contrastedWith":[],"associatedPeople":["plotinus","augustine","plato"],"isFlagship":false,"notes":"The normative order is what the Rhineland mystics replace with descent spirituality; what Luther rejects via sola fide; what is largely lost in the modern world.","subConcepts":[],"commonConfusions":["The normative order is not a moral code, it is an ontological structure of ascent in which reality and self become more real together through anagoge.","The normative order is not the same as having ideals, it requires a structured ontology of levels of reality and levels of self, not merely aspiring to do better.","The Rhineland mystics invert the normative order into a descent spirituality, this is a fundamental revision of the Plotinian ascent, not merely a variant of it."],"keyPassages":[{"episode":19,"phrase":"From Plotinus himself, we get now what I'm going to call the Normative Order (writes Normative Order off of Plotinus and beside Aristotelian Worldview) . Plotinus gave us an account of how we can move in a coordinated fashion up the levels of reality, up the levels of consciousness, up the levels of the self, from what is less real to what is more real","role":"definition"},{"episode":18,"phrase":"Plotinus is the grand unified field theory of ancient spirituality because what does he do? Well, he takes Plato's spirituality. He takes the whole idea of anagoge from Plato. He takes Aristotle's theory, the whole Aristotle worldview, the theory of knowing, the theory of the structure of the world.","role":"exemplar"},{"episode":20,"phrase":"All of this was integrated together. These three orders that articulate the space of how we're connected to ourselves, to each other and to the world. The normal logical, the normative and the narrative","role":"application"}]},{"id":"ontonormativity","canonicalName":"ontonormativity","aliases":[],"definition":"The combination of ontological force (being experienced as more real than ordinary reality) and normative demand (placing a demand on one to transform accordingly) that characterizes higher states of consciousness, making them justify rather than merely describe transformative experience.","sourcePassage":{"episode":10,"quote":"So I call this... So we have a higher state of consciousness. I call this the problem of the \"Ontonormativity.\" Remember that \"ontology\" has to do with the structure of reality. Normative is when things are placing a demand on you to be better, to improve."},"depth":4,"cluster":"cognitive-science","introducedIn":10,"developedIn":[11,12,16],"appliedIn":[17,33,39],"prerequisites":["higher-states-of-consciousness"],"relatedConcepts":["higher-states-of-consciousness","transformative-experience","the-sacred"],"contrastedWith":[],"associatedPeople":[],"isFlagship":false,"notes":"Vervaeke's neologism for the puzzle of higher states of consciousness. He resolves the puzzle by arguing they justify via optimization of plausibility machinery, not via propositional content.","subConcepts":[],"commonConfusions":["Ontonormativity is not a metaphysical claim that values are built into mind-independent reality; it is a phenomenological claim about how consciousness presents normative demands.","It is not identical to moral normativity; it is the broader sense in which cognition is pulled toward better contact with what is real.","Ontonormativity is not a problem to be solved but a structural feature of consciousness that must be acknowledged in any adequate cognitive science of mind."],"keyPassages":[{"episode":10,"phrase":"I call this the problem of the 'Ontonormativity.' Remember that 'ontology' has to do with the structure of reality. Normative is when things are placing a demand on you to be better, to improve.","role":"definition"},{"episode":10,"phrase":"The core function of consciousness seems to be to help you realize, become aware of, actualize, put into action, 'Relevance': relevant information.","role":"application"},{"episode":29,"phrase":"consciousness seems to be bound up with Relevance Realisation","role":"summary"},{"episode":38,"phrase":"Is it therefore just pointing to something that's romantically dwelling within my subjectivity? No. It's pointing to caring about something that is inherently transjective","role":"qualification"}]},{"id":"optimal-grip","canonicalName":"optimal grip","aliases":[],"definition":"Merleau-Ponty's term, picked up by Dreyfus and Vervaeke, for the way an embodied agent dynamically adjusts to a situation to maximize interactional contact, neither too far (losing detail) nor too close (losing gestalt), the basic phenomenological achievement of consciousness's relevance-realization.","sourcePassage":{"episode":10,"quote":"I'm taking my salience landscape and I'm using it to get an optimal grip on things. Not maximal. And 'grip' is meant here as a metaphor. It's meant for my contact, my interactional contact."},"depth":3,"cluster":"cognitive-science","introducedIn":10,"developedIn":[11,12,13,31,32],"appliedIn":[9,28,30,33,36,38],"prerequisites":["salience-landscape"],"relatedConcepts":["salience-landscape","relevance-realization","transjective-relations","4e-cognition"],"contrastedWith":[],"associatedPeople":["merleau-ponty","dreyfus"],"isFlagship":false,"notes":"Vervaeke uses optimal grip as the phenomenological correlate of his cognitive-science account of relevance realization.","subConcepts":[],"commonConfusions":["Optimal grip is not maximal grip, seeking maximum detail or maximum abstraction both impede the dynamic balance that characterizes good cognition.","Optimal grip is not a fixed setting; it must be continuously adjusted as the agent-arena relationship evolves.","Optimal grip is not purely cognitive; it is enacted through the body and the sensorimotor loop, not calculated abstractly."],"keyPassages":[{"episode":10,"phrase":"I'm taking my salience landscape and I'm using it to get an optimal grip on things. Not maximal. And 'grip' is meant here as a metaphor.","role":"definition"},{"episode":8,"phrase":"attention isn't a spotlight. It's a very complex optimisation process.","role":"qualification"},{"episode":31,"phrase":"The world and the organism are co-creating co-determining co-evolving the fittedness.","role":"exemplar"}]},{"id":"parasitic-processing","canonicalName":"parasitic processing","aliases":[],"definition":"Self-reinforcing dynamic patterns of cognition in which the very adaptive heuristics (representativeness, availability, confirmation bias) feed on each other and on one's affect to produce locked-in self-deceptive, self-destructive spirals, like the cognitive dynamic underlying depression or anxiety, that one cannot escape by intervening at any single point.","sourcePassage":{"episode":13,"quote":"We called this in, when we published, \"Parasitic Processing\". It's not just about bad events. This is just one example. We get into all kinds of these spirals."},"depth":3,"cluster":"cognitive-science","introducedIn":13,"developedIn":[14,17,36,37,45],"appliedIn":[16,18,19,20,21,23,38,39,46],"prerequisites":["self-deception"],"relatedConcepts":["reciprocal-narrowing","self-deception","modal-confusion","the-eightfold-path","existential-entrapment","dukkha"],"contrastedWith":["the-eightfold-path"],"associatedPeople":["leo-ferraro","marc-lewis"],"isFlagship":true,"notes":"Vervaeke's published account (with Ferraro). Distinct from but interpenetrating with reciprocal narrowing (Lewis). The Buddhist Eightfold Path is described as a counteractive dynamical system.","subConcepts":[{"name":"self-organizing-self-destructive-loop","description":"The core structure of parasitic processing: an adaptive self-organization that hijacks the agent's resources and progressively undermines the very machinery it depends on.","keyPassages":[{"episode":13,"phrase":"We called this in, when we published, 'Parasitic Processing'. It's not just about bad events. This is just one example. We get into all kinds of these spirals.","role":"definition"}],"passages":[]},{"name":"modal-confusion-as-driver","description":"Trying to satisfy being-mode needs (love, connection) within the having-mode generates the misfit that feeds parasitic processing.","keyPassages":[{"episode":38,"phrase":"We can address modal confusion by the cultivation of Sati.","role":"application"}],"passages":[]},{"name":"counteractive-dynamical-system","description":"A set of interlocking practices (e.g., the Eightfold Path) designed as a dynamical counterforce to the self-organizing momentum of parasitic processing.","keyPassages":[{"episode":13,"phrase":"The Eightfold Path is a counteractive dynamical system that counteracts parasitic processing and does reciprocal opening, beyond the ego self and beyond the everyday world","role":"application"}],"passages":[]}],"commonConfusions":["Parasitic processing is not simply bad habit, it is self-organizing and self-reinforcing, borrowing the adaptive machinery of relevance realization against the agent's interests.","The perennial problems Vervaeke identifies are not moral failures; they are structural vulnerabilities built into the very machinery that makes intelligent agency possible.","Addressing parasitic processing requires a counteractive dynamical system, not merely willpower or propositional insight, because the process operates below the level of deliberate control."],"keyPassages":[{"episode":13,"phrase":"We called this in, when we published, 'Parasitic Processing'. It's not just about bad events. This is just one example. We get into all kinds of these spirals.","role":"definition"},{"episode":13,"phrase":"Marc proposes a model that he calls 'Reciprocal Narrowing'. So here's your Agent and here's the Arena (drawn on the board). And what happens is the drug use is associated with a particular Agent:Arena relationship.","role":"exemplar"},{"episode":13,"phrase":"The Eightfold Path is a counteractive dynamical system that counteracts parasitic processing and does reciprocal opening, beyond the ego self and beyond the everyday world","role":"application"},{"episode":38,"phrase":"the very processes that make us intelligently adaptive also make us vulnerable to self-deceptive, self-destructive behavior","role":"summary"}]},{"id":"participatory-knowing","canonicalName":"participatory knowing","aliases":["knowing by participating","knowing by identifying","knowing by conforming"],"definition":"The deepest kind of knowing in which you know something by identifying with it, conforming to it, and being shaped by it as you shape it, the kind of knowing involved in a relationship, a culture, or in religious or contemplative transformation.","sourcePassage":{"episode":1,"quote":"There's the kind of knowing that is knowing what it's like to be in something you're pa
