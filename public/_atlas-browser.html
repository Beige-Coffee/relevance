<!doctype html>

<head>

<title>Awakening Atlas — Registry Browser</title>
<style>
  :root {
    --bg: #faf7f1;
    --surface: #ffffff;
    --elev: #f2ede0;
    --ink: #1c1a17;
    --ink-soft: #3a3530;
    --muted: #6b6660;
    --border: #e0d9c8;
    --accent: #8b3a3a;
    --gold: #b8893c;
    --blue: #3c4a8b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14120e;
      --surface: #1c1916;
      --elev: #25211c;
      --ink: #ece6d6;
      --ink-soft: #b8b1a1;
      --muted: #8a8378;
      --border: #2e2922;
      --accent: #d28a7e;
      --gold: #d4a85a;
      --blue: #8aa1e3;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .serif { font-family: "EB Garamond", Georgia, serif; }
  header {
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem; background: var(--bg);
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: blur(8px);
  }
  header h1 {
    font-family: "EB Garamond", Georgia, serif;
    font-size: 1.5rem; font-weight: 600; margin: 0;
    letter-spacing: -0.01em;
  }
  header h1 .gold { color: var(--gold); }
  header .totals {
    color: var(--muted); font-size: 0.85rem; margin-top: 0.2rem;
  }
  .tabs {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
    padding: 0 1.5rem; background: var(--bg);
    position: sticky; top: 68px; z-index: 9;
  }
  .tab {
    background: transparent; border: none; cursor: pointer;
    padding: 0.85rem 1.1rem; color: var(--muted);
    font-family: inherit; font-size: 0.9rem;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--ink); border-bottom-color: var(--accent); }
  .controls {
    display: flex; flex-wrap: wrap; gap: 0.5rem;
    padding: 0.75rem 1.5rem; align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 117px; z-index: 8;
  }
  .controls input[type="text"] {
    flex: 1; min-width: 200px; padding: 0.45rem 0.7rem;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--surface); color: var(--ink);
    font-family: inherit; font-size: 0.9rem;
  }
  .controls input[type="text"]:focus { outline: none; border-color: var(--accent); }
  .pill {
    display: inline-block; padding: 0.2rem 0.55rem;
    border: 1px solid var(--border); border-radius: 999px;
    background: var(--surface); color: var(--ink-soft);
    font-size: 0.75rem; cursor: pointer;
    transition: all 0.15s;
  }
  .pill:hover { border-color: var(--accent); color: var(--ink); }
  .pill.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .pill.flagship { color: var(--gold); border-color: var(--gold); }
  .pill.flagship.active { background: var(--gold); color: var(--bg); }
  main {
    padding: 1rem 1.5rem 4rem; max-width: 1400px; margin: 0 auto;
  }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1rem;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1rem; cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
  }
  .card:hover { border-color: var(--accent); }
  .card.flagship::before {
    content: "★"; color: var(--gold); margin-right: 0.4rem;
  }
  .card-title {
    font-family: "EB Garamond", Georgia, serif;
    font-size: 1.15rem; font-weight: 500; margin: 0 0 0.25rem;
    color: var(--ink); line-height: 1.2;
  }
  .card-meta {
    font-size: 0.75rem; color: var(--muted); margin-bottom: 0.4rem;
    display: flex; gap: 0.6rem; flex-wrap: wrap;
  }
  .card-meta .cluster-tag {
    color: var(--accent); font-variant: small-caps;
  }
  .card-def {
    font-family: "EB Garamond", Georgia, serif;
    font-size: 0.95rem; line-height: 1.5; color: var(--ink-soft);
    overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  }
  /* Detail modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: none; align-items: flex-start; justify-content: center;
    padding: 2rem; overflow-y: auto; z-index: 100;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.5rem 2rem;
    max-width: 760px; width: 100%;
  }
  .modal h2 {
    font-family: "EB Garamond", Georgia, serif;
    font-size: 1.9rem; margin: 0 0 0.3rem; color: var(--ink);
    letter-spacing: -0.01em;
  }
  .modal .id {
    font-family: ui-monospace, "Menlo", monospace; font-size: 0.7rem;
    color: var(--muted); margin-bottom: 1rem;
  }
  .modal section { margin: 1rem 0; }
  .modal h3 {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); margin: 0 0 0.4rem;
  }
  .modal p { margin: 0.3rem 0; }
  .modal .def {
    font-family: "EB Garamond", Georgia, serif; font-size: 1.05rem;
    line-height: 1.6; color: var(--ink);
  }
  .modal .quote {
    border-left: 3px solid var(--gold); padding: 0.5rem 0.8rem;
    margin: 0.5rem 0; background: var(--elev);
    font-family: "EB Garamond", Georgia, serif; font-style: italic;
    color: var(--ink-soft); font-size: 0.95rem;
  }
  .modal .quote .ep {
    display: block; font-family: ui-monospace, monospace; font-style: normal;
    font-size: 0.7rem; color: var(--accent); margin-bottom: 0.3rem;
  }
  .ref-pill {
    display: inline-block; padding: 0.15rem 0.5rem; margin: 0.1rem 0.2rem 0.1rem 0;
    border: 1px solid var(--border); border-radius: 999px;
    background: var(--surface); color: var(--ink-soft);
    font-size: 0.78rem; cursor: pointer;
    text-decoration: none;
  }
  .ref-pill:hover { border-color: var(--accent); color: var(--ink); }
  .ref-pill.ep { color: var(--accent); }
  .ref-pill.person { color: var(--blue); }
  .ref-pill.concept { color: var(--gold); }
  .close {
    position: absolute; top: 0.75rem; right: 1rem;
    background: transparent; border: none; cursor: pointer;
    color: var(--muted); font-size: 1.5rem; line-height: 1;
  }
  .close:hover { color: var(--accent); }
  .stats {
    display: flex; gap: 2rem; flex-wrap: wrap;
    color: var(--muted); font-size: 0.85rem; padding: 0.75rem 0;
  }
  .stats strong { color: var(--ink); }
  .keyPassage {
    border-left: 2px solid var(--border); padding: 0.4rem 0.8rem;
    margin: 0.4rem 0;
  }
  .keyPassage .role {
    font-family: ui-monospace, monospace; font-size: 0.7rem;
    text-transform: uppercase; color: var(--muted); margin-bottom: 0.2rem;
  }
  .subConcept {
    padding: 0.6rem 0.8rem; margin: 0.4rem 0;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--elev);
  }
  .subConcept .sc-name {
    font-family: "EB Garamond", Georgia, serif; font-weight: 500;
    font-size: 1rem; color: var(--ink);
  }
  .subConcept .sc-summary { font-size: 0.9rem; color: var(--ink-soft); margin: 0.2rem 0 0.3rem; }
  details { margin: 0.5rem 0; }
  summary { cursor: pointer; color: var(--muted); font-size: 0.85rem; }
  summary:hover { color: var(--ink); }
  .empty {
    text-align: center; padding: 4rem 1rem;
    color: var(--muted);
  }
</style>
</head>

<script id="data" type="application/json">{"concepts":[{"id":"4e-cognition","canonicalName":"4E cognition","aliases":["4E cognitive science","third generation cognitive science","embodied embedded enacted extended cognition"],"definition":"The third-generation cognitive science framework treating cognition as embodied (constitutively dependent on the body), embedded (constitutively coupled to environment), enacted (constituted in interaction), and extended (using external tools and other minds), providing the naturalistic worldview in which relevance realization and religio can be situated.","sourcePassage":{"episode":31,"quote":"We're also talking, not only about it being embodied \\[and\\] embedded, it is inherently a \\[transactional\\] relation of relevance realization. The world and the organism are co-creating co-determining co-evolving the fittedness."},"depth":3,"cluster":"cognitive-science","introducedIn":26,"developedIn":[30,31,32,38],"appliedIn":[33,36,37,39,40,41,42,43,44,45,46,47],"prerequisites":[],"relatedConcepts":["relevance-realization","transjective-relations","participatory-knowing"],"contrastedWith":[],"associatedPeople":["andy-clark","varela","dreyfus","merleau-ponty"],"isFlagship":true,"notes":"Vervaeke uses 4E cognition as the worldview within which his response to the meaning crisis is situated, a naturalistic, scientific worldview that nevertheless restores transjective participation.","subConcepts":[{"name":"embodiment","description":"Cognition is grounded in sensorimotor interaction with the world; mind arises through immediate coping, not rule-bound symbol manipulation.","keyPassages":[{"episode":38,"phrase":"Mind is not programmed software or rule-bound manipulation of symbols. Instead, the mind arises through immediate coping with the world.","role":"definition"}],"passages":[]},{"name":"embeddedness","description":"Organisms and environments are co-constituting through niche construction; cognition cannot be understood apart from environmental coupling.","keyPassages":[{"episode":38,"phrase":"the organism is shaping the environment, shaping and selecting the environment, and the environment is shaping and selecting the organism … You've got this transjective evolving loop going on, niche construction.","role":"definition"}],"passages":[]},{"name":"enaction","description":"Cognition is something organisms do, it is enacted through the sensorimotor loop, rather than a passive reception of inputs.","keyPassages":[{"episode":38,"phrase":"cognition is an inherently something we enact","role":"definition"}],"passages":[]},{"name":"extension","description":"Cognition extends beyond the brain through psychotechnologies, artifacts, and distributed social networks.","keyPassages":[{"episode":38,"phrase":"our cognition is not in our head, but it's extended through our interactions, through the world, through our psychotechnologies, through distributed cognition","role":"definition"}],"passages":[]},{"name":"deep-continuity-hypothesis","description":"There is continuity between the principles of cognition, biology, and self-organizing dynamical systems, placing mind within the natural order rather than above it.","keyPassages":[{"episode":38,"phrase":"the mind and the world are not disconnected. They are in a deep continuity of embeddedness and enactive processing.","role":"summary"}],"passages":[]}],"commonConfusions":["4E cognition does not deny the importance of internal representations, it denies that representations are the origin or sufficient basis for cognition.","Embeddedness is not the same as mere environmental influence; it refers to the co-constituting loop between organism and environment in niche construction.","4E cognition is not anti-scientific, it is a third-generation cognitive science that expands the scientific account of mind beyond computational internalism.","The four E's are distinct emphases within a unified framework, not independent theories; they mutually presuppose the organism-environment loop."],"keyPassages":[{"episode":38,"phrase":"Mind is not programmed software or rule-bound manipulation of symbols. Instead, the mind arises through immediate coping with the world.","role":"definition"},{"episode":38,"phrase":"our cognition is not in our head, but it's extended through our interactions, through the world, through our psychotechnologies, through distributed cognition","role":"definition"},{"episode":38,"phrase":"the mind and the world are not disconnected. They are in a deep continuity of embeddedness and enactive processing.","role":"summary"},{"episode":31,"phrase":"The world and the organism are co-creating co-determining co-evolving the fittedness.","role":"exemplar"}]},{"id":"daath","canonicalName":"Da'ath","aliases":["Daath","Da'at"],"definition":"The Hebraic kind of knowing, the participatory knowing of being on course in the unfolding cosmic story, of one's life being changed by what one is changing as one engages with it, the same word used for sexual intercourse, marking it as a deeply participatory knowing.","sourcePassage":{"episode":3,"quote":"Faith was your sense of \"DA'ATH\". Faith was your sense that you are in this reciprocal realization: you're \"in course\". You're \"on course\". You're involved and evolving with things."},"depth":3,"cluster":"historical","introducedIn":3,"developedIn":[4,15,16,33],"appliedIn":[17,19,39],"prerequisites":["participatory-knowing","narrative-order"],"relatedConcepts":["narrative-order","kairos","participatory-knowing"],"contrastedWith":[],"associatedPeople":[],"isFlagship":false,"notes":"Vervaeke uses Da'ath to recover the original Hebraic meaning of faith, far from credulous assertion, it is participatory courseness.","subConcepts":[{"id":"faith-as-courseness","name":"Faith as participatory courseness","summary":"In Hebraic thought, faith (emunah) is not belief in doctrines but the lived participatory sense of being on course, Da'ath, knowing one is moving in the right direction within the unfolding cosmic story.","passages":[{"episode":3,"phrase":"Faith was your sense of 'DA'ATH'. Faith was your sense that you are in this reciprocal realization: you're 'in course'. You're 'on course'. You're involved and evolving with things."}]},{"id":"sin-as-deviation","name":"Sin as going off course","summary":"Sin in the Hebraic tradition means missing the mark, being self-deceived and thereby navigating off the course of the unfolding cosmic story toward the promised land.","passages":[]}],"commonConfusions":["Da'ath is not propositional knowledge about God, it is participatory knowing of being in the right relational course, the same word used for sexual intercourse, marking it as a deeply intimate, mutual knowing.","Faith in the Hebraic sense derived from Da'ath is not credulous assertion of beliefs without evidence, that modern meaning is recent and largely a product of the Reformation's reduction of faith to propositional assent.","Da'ath is not a uniquely religious concept in Vervaeke's usage, it describes the same participatory-knowing structure that appears in loving relationships, expert practice, and any situation where one senses 'I'm on course.'"],"keyPassages":[{"episode":3,"phrase":"Faith was your sense of 'DA'ATH'. Faith was your sense that you are in this reciprocal realization: you're 'in course'. You're 'on course'. You're involved and evolving with things.","role":"definition"},{"episode":3,"phrase":"Notice you have this in your relationships. You'll often be asking yourself 'How is this relationship going? Is it on course? Is it progressing? Is it growing?'","role":"application"}]},{"id":"the-one","canonicalName":"The One","aliases":["The One (Plotinus)","the One"],"definition":"Plotinus's name for the inexhaustible source of all intelligibility and being, that by which everything is realized, but which itself cannot be known propositionally, only united with through being one.","sourcePassage":{"episode":18,"quote":"So Plotinus calls this The One. He doesn't mean the single. This is that by which reality is realized and our mind realizes reality."},"depth":4,"cluster":"historical","introducedIn":18,"developedIn":[19,35],"appliedIn":[20,39,48,50],"prerequisites":["neoplatonism"],"relatedConcepts":["the-good","neoplatonism","anagoge","higher-states-of-consciousness"],"contrastedWith":[],"associatedPeople":["plotinus","augustine"],"isFlagship":false,"notes":"Plotinus uses the metaphor of light: The One is itself invisible but makes seeing possible. Neo from The Matrix is named for Neoplatonism.","subConcepts":[],"commonConfusions":["The One is not singular in the sense of one-among-many, Vervaeke is explicit that Plotinus does not mean 'the single'; The One is the principle by which all things are realized and by which all minds realize things, beyond enumeration.","The One cannot be known propositionally, because all propositional knowledge involves distinctions and The One is prior to all distinctions, it can only be 'known' by being one, i.e., through a higher state of consciousness.","The One is not identical to the Christian God, it has no will, no intentionality, no personal relationship; Augustine had to significantly transform both Neoplatonism and Christian theology to integrate them."],"keyPassages":[{"episode":18,"phrase":"Plotinus calls this The One. He doesn't mean the single. This is that by which reality is realized and our mind realizes reality.","role":"definition"},{"episode":18,"phrase":"Plotinus uses the metaphor of light. Just like light is itself invisible and makes everything seeable, The One is not anything we can ever know.","role":"exemplar"},{"episode":18,"phrase":"You can only have gnosis of The One by being one.","role":"application"}]},{"id":"absurdity","canonicalName":"absurdity","aliases":["the absurd"],"definition":"The experience of disconnection between agent and arena, the tennis player in the football arena, in which one's actions and projects no longer make sense within a worldview; a fundamental symptom of the meaning crisis.","sourcePassage":{"episode":7,"quote":"You will be like the tennis player trying to play tennis in the football arena. You will start to experience your existence as absurd. It won't make any sense to you."},"depth":3,"cluster":"historical","introducedIn":7,"developedIn":[16,23,33,46],"appliedIn":[11,17,20,22,36,38,50],"prerequisites":["agent-arena-relationship","worldview-attunement"],"relatedConcepts":["horror","nihilism","the-meaning-crisis"],"contrastedWith":["worldview-attunement"],"associatedPeople":["camus","sartre"],"isFlagship":false,"notes":"Camus is the modern philosopher of the absurd; Vervaeke argues that absurdity is what happens when worldview attunement fails.","subConcepts":[],"commonConfusions":["Absurdity in Vervaeke's sense is not primarily a philosophical thesis (Camus's absurdism) but a phenomenological diagnosis: the lived experience of agent-arena decoupling, when one's existential mode no longer affords meaningful action.","Absurdity is not the same as meaninglessness in a nihilistic sense, it is specifically the mismatch between agent and arena (the tennis player in the football field), not a claim that meaning is impossible in principle.","The cure for absurdity is not intellectual insight alone, because absurdity is an existential mode, resolving it requires transframing (a transformation of both self and world), not simply adopting a new philosophy."],"keyPassages":[{"episode":7,"phrase":"You will be like the tennis player trying to play tennis in the football arena. You will start to experience your existence as absurd. It won't make any sense to you.","role":"definition"},{"episode":7,"phrase":"If I put the tennis player into the football arena, it's absurd! It doesn't make any sense! Things aren't... the tennis player can do all they want and it doesn't make any sense.","role":"exemplar"},{"episode":7,"phrase":"one of the ways in which the meaning crisis expresses itself is in people saying that they feel existence is absurd.","role":"application"},{"episode":7,"phrase":"As the Nomological order breaks down, of course, then we start to confront absurdity and we start to lose a sense of how we fit in and how we belong.","role":"summary"}]},{"id":"agape","canonicalName":"agape","aliases":["agapic love","Christian love","for-giving love"],"definition":"The creative, sacrificial love that turns non-persons into persons, the love by which a parent loves an infant who cannot yet be a friend or a partner, preceding, permeating, and following individuals; the love Vervaeke argues makes us into persons through being loved before we have earned it.","sourcePassage":{"episode":16,"quote":"This is the love of creation. It's the love that God is demonstrating towards humanity in the way God is an ongoing creation of the open future. So God is creating the future."},"depth":3,"cluster":"normative","introducedIn":15,"developedIn":[16,20,38,43,44,45],"appliedIn":[17,18,19,22,23,39,40,42,46,50],"prerequisites":[],"relatedConcepts":["eros","philia","the-axial-revolution","metanoia","kairos","gnosis","anagoge"],"contrastedWith":["eros","philia"],"associatedPeople":["jesus-of-nazareth","paul","augustine","john-evangelist"],"isFlagship":true,"notes":"Vervaeke identifies God in Christianity with the process of agape itself, drawing on John's epistle. Agape is transjective: it precedes us, flows through us, and we participate in it; we did not make it.","subConcepts":[{"id":"agape-as-creative-personhood","name":"Agape as creative personhood-making","summary":"Agape is the love that transforms a non-person animal into a moral agent person, it operates before the beloved has earned anything and before reciprocity is possible.","passages":[]},{"id":"agape-as-sacrificial-forgiving","name":"Agape as sacrificial for-giving","summary":"Agape involves a sacrificial element, giving before the person earns it, which is why Jesus emphasises forgiveness as central: all agapic love is 'for-giving' love.","passages":[{"episode":16,"phrase":"Agape has a sacrificial component to it because what I'm actually doing is I'm giving up, I'm making myself an affordance for your transformation from non-person into person."}]},{"id":"agape-as-metanoia-trigger","name":"Agape as trigger of metanoia","summary":"The experience of giving or receiving agapic love re-centres the salience landscape away from egocentrism, effecting the radical transformation of orientation that Vervaeke calls metanoia.","passages":[{"episode":16,"phrase":"This is the metanoia of Agape. I mean the metaphor is turning, but the problem with that metaphor is [that] all 'turning' (demonstrated physically by turning on the spot while standing) is still egocentric. You have to think of the turning this way: The turning is \"I go from being egocentric (pointing internally to himself) to being centered on someone else (pointing out and away from himself)\"."}]},{"id":"agape-as-participatory-gnosis","name":"Agape bound with participatory knowing (gnosis)","summary":"Paul's Corinthians passage presents agape as a mode of knowing by participation, 'we know as we are known', so gnosis and agape are inseparably intertwined for Vervaeke.","passages":[{"episode":16,"phrase":"Paul is actually talking about 'there's a way of knowing' - and we're going to come back to this. The term that's being used there is Gnosis - that is bound up with Agape, this way of loving."}]},{"id":"agape-as-transjective-process","name":"Agape as transjective process","summary":"Agape precedes individuals, flows through them, and transforms them, it is not a private feeling but a participatory process in which individuals are vessels, not originators.","passages":[{"episode":16,"phrase":"The Agape that preceeds me, flows through me, and transforms me as I'm oriented. And what Jesus was offering, I believe, was he was offering a teaching so that all people could experience this."}]}],"commonConfusions":["Agape is not a warm feeling toward someone attractive, that is eros; agape is the love that creates the beloved's personhood before they have earned any love at all.","Agape is not the same as forgiveness in the trivial sense of accepting an apology, all agapic love is 'for-giving' because it gives before the recipient has earned anything.","Love is not an emotion for Vervaeke, it is a modal way of being, an Agent-Arena relationship, not a feeling that fluctuates.","Agape is not uniquely Christian in Vervaeke's treatment, it points to a universal psycho-technology of person-creation that Christianity named and systematised."],"keyPassages":[{"episode":16,"phrase":"This is the love of creation. It's the love that God is demonstrating towards humanity in the way God is an ongoing creation of the open future. So God is creating the future.","role":"definition"},{"episode":15,"phrase":"Love isn't a feeling. It isn't an emotion. It is a modal way of being. It is an Agent-Arena relationship.","role":"qualification"},{"episode":15,"phrase":"you love it because by loving it, you turn a non-person into a person. It's the closest thing to a miracle","role":"exemplar"},{"episode":16,"phrase":"God is this process that we participate in. And we put... Look, it made you, you didn't make it! You participate in Agape. It precedes you, it flows through you and you participate in it insofar as you help other people to come to personhood through you.","role":"summary"},{"episode":16,"phrase":"Agape has a sacrificial element to it in that you give yourself, you \"for-give\", you give before the person earns.","role":"definition"}]},{"id":"agent-arena-relationship","canonicalName":"agent-arena relationship","aliases":["agent and arena","agent-arena","agent/arena"],"definition":"The co-identifying coupling in which the self assumes an identity as an agent while assigning the world an identity as an arena that affords appropriate action, together producing the meta-meaning relation within which all individual meanings are possible.","sourcePassage":{"episode":7,"quote":"what you have, when you have a world view, is you've got this Agent and Arena coupling."},"depth":3,"cluster":"cognitive-science","introducedIn":7,"developedIn":[8,9,13,17,33,36,38],"appliedIn":[10,11,12,14,16,18,23,26,31,40,43,44,45,46],"prerequisites":["existential-mode"],"relatedConcepts":["existential-mode","worldview-attunement","nomological-order","transjective-relations","religio"],"contrastedWith":["absurdity"],"associatedPeople":["geertz","fromm","buber"],"isFlagship":false,"notes":"The agent-arena relationship is the locus where all individual projects of meaning gain their significance; its loss is the absurdity that Vervaeke (with Mastropietro and Miscevic) explored in 'Zombies in Western Culture.'","subConcepts":[{"name":"co-identification","description":"The mutual shaping of agent and arena such that a coherent identity on each side emerges simultaneously from their fit together.","keyPassages":[{"episode":7,"phrase":"This process by which you are co-identifying agency and arena so that they fit together and make sense of each other and you get a coherent and functioning world view... That's your existential mode.","role":"definition"}],"passages":[]},{"name":"worldview-coupling","description":"The agent-arena relationship is the structural unit of a worldview: having a worldview just is having this coupling operational.","keyPassages":[{"episode":7,"phrase":"what you have, when you have a world view, is you've got this Agent and Arena coupling.","role":"definition"}],"passages":[]}],"commonConfusions":["The agent-arena relationship is not merely a context or background, it is the primary unit of meaning-making from which all more specific projects derive.","Arena does not mean the physical environment alone; it includes the normative and narrative orders that make the environment intelligible to an agent."],"keyPassages":[{"episode":7,"phrase":"what you have, when you have a world view, is you've got this Agent and Arena coupling.","role":"definition"},{"episode":7,"phrase":"This process by which you are co-identifying agency and arena so that they fit together and make sense of each other and you get a coherent and functioning world view... That's your existential mode.","role":"definition"},{"episode":31,"phrase":"The world and the organism are co-creating co-determining co-evolving the fittedness.","role":"summary"}]},{"id":"akrasia","canonicalName":"akrasia","aliases":["weakness of will"],"definition":"Aristotle's name for the foolish state in which one knows what is right but does the wrong thing anyway, not from ignorance but from insufficient character, refuting the Socratic intellectualism that knowledge of the good entails doing the good.","sourcePassage":{"episode":6,"quote":"Akrasia is when you know what the right thing to do is - you KNOW what the right thing to do is - and we talked about this, remember, with the chocolate cake. But you don't do the right thing."},"depth":2,"cluster":"historical","introducedIn":6,"developedIn":[7,16],"appliedIn":[40,41,42,43],"prerequisites":["the-divided-psyche"],"relatedConcepts":["foolishness","virtue","wisdom"],"contrastedWith":["wisdom"],"associatedPeople":["aristotle","paul"],"isFlagship":false,"notes":"Aristotle's response to akrasia is the cultivation of character through habituation, the virtual engine.","subConcepts":[],"commonConfusions":["Akrasia is not simply weakness of will in the Protestant sense, Vervaeke rejects the notion that 'willpower' is what is lacking; Aristotle's point is that character (habituated disposition) is what is deficient, not a mental muscle called will.","Akrasia does not imply that knowledge is irrelevant to virtue, it refutes Socratic intellectualism (that knowledge of the good entails doing it), but Aristotle's response is not to abandon reason but to supplement it with cultivated character.","Akrasia is not weakness in the face of temptation in a moral sense, it is a cognitive-developmental failure: the structural-functional organization of character has not been cultivated so that salience and understanding align."],"keyPassages":[{"episode":6,"phrase":"Akrasia is when you know what the right thing to do is - you KNOW what the right thing to do is - and we talked about this, remember, with the chocolate cake. But you don't do the right thing.","role":"definition"},{"episode":6,"phrase":"which we poorly translate as 'weakness of the will' because we're all post Protestants and we think the will is our central thing even though, increasingly, there's scientific evidence that the notion of will or willpower is a defunct idea, we should give it up!","role":"qualification"},{"episode":5,"phrase":"I know I should lose weight. There is the evidence, it's clear and makes rational sense to me. I should lose weight. Yes yes. OK. I should lose weight. And then I go home and there sitting on the counter is some chocolate cake!","role":"exemplar"},{"episode":6,"phrase":"Ignorance is when you do the wrong thing because you don't know. Part of what foolishness is, is when you know what the right thing is and you still do the wrong thing.","role":"summary"}]},{"id":"altered-states-of-consciousness","canonicalName":"altered states of consciousness","aliases":["ASC","altered state of consciousness"],"definition":"States in which the salience, presence, and depth landscapes are radically transformed, typically through disruption (sleep deprivation, psychedelics, fasting, ritual), producing systematic insight of consciousness rather than insight in consciousness.","sourcePassage":{"episode":10,"quote":"an altered state of consciousness is not a... It's not an insight in consciousness it's an insight of consciousness. It's a radical transformation of all of your landscapes, not just this particular problem."},"depth":3,"cluster":"cognitive-science","introducedIn":1,"developedIn":[2,8,9,10,11,12],"appliedIn":[13,17,18,33,36,37,39],"prerequisites":["consciousness","salience-landscape"],"relatedConcepts":["higher-states-of-consciousness","flow","shamanism"],"contrastedWith":[],"associatedPeople":["newberg","steve-taylor","yaden"],"isFlagship":true,"notes":"ASCs are commonly rejected as illusory; the puzzle of higher states of consciousness is why some are instead taken as more real than ordinary experience.","subConcepts":[{"name":"disruptive-strategies","description":"Deliberate practices (sleep deprivation, fasting, psychedelics, chanting) that destabilize default framing to enable cognitive exaptation.","keyPassages":[{"episode":2,"phrase":"typically the shaman engages in practices that are putting significant changes in their attention … disruptive strategies: sleep deprivation, sex depravation, social isolation, the use of psychedelics, extended chanting, dancing. All of these things are designed to bring about radical changes in the way in which the brain is operating.","role":"exemplar"}],"passages":[]},{"name":"cross-neural-integration","description":"Altered states permit brain areas that do not normally communicate to interact, enabling novel insight and pattern bridging.","keyPassages":[{"episode":2,"phrase":"what's happening in this state is your brain is learning to get areas to talk to each other that normally don't talk to each other. This is especially the case if you've gone through a massive disruption strategy","role":"definition"}],"passages":[]},{"name":"cognitive-exaptation","description":"Using capacities evolved for one function (e.g., sensorimotor pattern recognition) in radically new cognitive domains via altered states and psychotechnology.","keyPassages":[{"episode":2,"phrase":"the Upper Paleolithic transition was probably driven by the way shamanism was a set of pscyho-technologies for altering states of consciousness to cognitively exapt the enhanced abilities","role":"exemplar"}],"passages":[]}],"commonConfusions":["Altered states are not simply confusion or impairment, they can afford genuine cognitive enhancement when embedded in appropriate practice contexts.","The value of altered states depends entirely on what is done with the cross-neural integration they make available; insight must be integrated into waking cognition.","Altered states are not the same as higher states of consciousness; altered states are the vehicle, higher states are the destination, though they often overlap."],"keyPassages":[{"episode":2,"phrase":"the Upper Paleolithic transition was probably driven by the way shamanism was a set of pscyho-technologies for altering states of consciousness to cognitively exapt the enhanced abilities","role":"definition"},{"episode":2,"phrase":"what's happening in this state is your brain is learning to get areas to talk to each other that normally don't talk to each other.","role":"exemplar"},{"episode":2,"phrase":"Getting into the flow state: Notice what's going on here. Notice you're getting something that's almost like a mystical experience. It's a powerful, altered state of consciousness.","role":"exemplar"},{"episode":38,"phrase":"we can respond to existential entrapment by the cultivation of gnosis, which can be empowered by a core capacity for realizing higher states of consciousness","role":"application"},{"episode":10,"phrase":"The core function of consciousness seems to be to help you realize, become aware of, actualize, put into action, 'Relevance': relevant information.","role":"qualification"}]},{"id":"anagoge","canonicalName":"anagoge","aliases":["anagogic","anagogy","anagogical ascent"],"definition":"The Platonic ascent, the reciprocally accelerating process in which growing contact with reality and growing inner integration mutually feed each other, so self and world simultaneously become more real through a cycle of disclosure, transformation, and deeper disclosure.","sourcePassage":{"episode":5,"quote":"There's a Greek word for this 'ascent' called \"Anagoge\". This is the \"Anagogic\", or the \"Anagogical\" aspect of Plato's idea"},"depth":4,"cluster":"normative","introducedIn":5,"developedIn":[6,7,13,17,18,38],"appliedIn":[8,9,10,11,12,16,19,22,23,33,36,37,39,43,50],"prerequisites":["the-platonic-project"],"relatedConcepts":["the-myth-of-the-cave","self-transcendence","agape","transframing","sensibility-transcendence","transformative-experience"],"contrastedWith":["reciprocal-narrowing"],"associatedPeople":["plato","plotinus","augustine"],"isFlagship":false,"notes":"Anagoge is one of Vervaeke's most-used technical terms; the opposite of Mark Lewis's reciprocal narrowing. Love (agape) is described as an anagogic process of reciprocal realization.","subConcepts":[{"id":"anagoge-as-reciprocal-acceleration","name":"Anagoge as reciprocal acceleration","summary":"The anagogic process is self-reinforcing: as one contacts more of reality one becomes more capable of contact, and that increased capability discloses yet more reality.","passages":[{"episode":17,"phrase":"This is anagoge. Anagoge is precisely to set things up so that as this, as this is transcending as its decline, as I'm coming more into contact with what's real, getting below the illusion, like Paul just seeing things in mirror or just shadows on the cave for player as that opens up, that affords me transforming, right?"}]},{"id":"anagoge-vs-reciprocal-narrowing","name":"Anagoge versus reciprocal narrowing","summary":"Anagoge is the opposite of Marc Lewis's reciprocal narrowing: where addiction shrinks agent and arena together, anagoge expands them in a mutually opening spiral.","passages":[{"episode":13,"phrase":"The Eightfold Path is a counteractive dynamical system that counteracts parasitic processing and does reciprocal opening, beyond the ego self and beyond the everyday world"}]}],"commonConfusions":["Anagoge is not simply intellectual ascent, it involves simultaneous transformation of the self and deepened contact with reality, both happening together.","Anagoge is not guaranteed by effort alone, it requires the right ecology of psycho-technologies, a community, and often an altered state of consciousness to initiate.","The myth of the cave is not just a metaphor for learning facts, it depicts anagoge, a radical perspectival-participatory transformation, not an increase in propositional knowledge."],"keyPassages":[{"episode":5,"phrase":"There's a Greek word for this 'ascent' called \"Anagoge\". This is the \"Anagogic\", or the \"Anagogical\" aspect of Plato's idea","role":"definition"},{"episode":17,"phrase":"what I need is I need not only an enactive analogy, I need a way of enacting anagoge. And that is also what religious ritual used to do for us.","role":"application"}]},{"id":"aspiration","canonicalName":"aspiration","aliases":["aspirational rationality","proleptic rationality"],"definition":"Agnes Callard's incremental version of transformative experience: a process by which one becomes a different self with different values one does not yet fully possess, proleptically rational, since it must be a kind of rationality even as it transcends current rational ground.","sourcePassage":{"episode":45,"quote":"My aspiring to rationality has to be itself a kind of rationality. That's proleptic rationality, or to use something older. My loving of wisdom. My loving of wisdom. My aspiring to becoming wise cannot itself be an irrational process."},"depth":4,"cluster":"methodological","introducedIn":42,"developedIn":[44,45,46,50],"appliedIn":[40,43,47,48],"prerequisites":["transformative-experience"],"relatedConcepts":["transformative-experience","rationality","wisdom","philia-sophia","the-symbol"],"contrastedWith":[],"associatedPeople":["la-paul"],"isFlagship":false,"notes":"Vervaeke argues aspiration is essential to any non-self-refuting model of rationality, since the aspiration toward becoming rational must itself be rational.","subConcepts":[{"id":"proleptic-rationality","name":"Proleptic rationality","summary":"Aspiration must be a form of rationality even though it cannot be inferential; Callard calls this proleptic rationality, the rationality appropriate to aspiring toward values one does not yet fully possess, otherwise aspiring to rationality itself would be irrational.","passages":[]},{"id":"incremental-vs-sudden-transformation","name":"Incremental aspiration vs. sudden inspiration","summary":"Callard's aspiration is the incremental developmental complement to L.A. Paul's sudden transformative experience; both require perspectival and participatory knowing inaccessible to inferential decision-theory.","passages":[]}],"commonConfusions":["Aspiration is not mere motivation or wanting; it is a specific structure in which one proleptically acts on values one does not yet possess, using placeholders (symbols, gnosis) to bridge the gap.","The fact that aspiration cannot be solved by decision theory does not make it irrational; Callard's central point, which Vervaeke endorses, is that it is a form of proleptic rationality.","Aspiration is not the same as inspiration; inspiration (sudden insight-driven transformation) and aspiration (incremental developmental trajectory) are complementary, not competing, accounts."],"keyPassages":[{"episode":46,"phrase":"aspiration also probably has an affective component to it. And I suggested that wonder, and we saw how central wonder is to the cultivation of wisdom, that wonder is the affective state that's most conducive to aspirational progress","role":"application"},{"episode":45,"phrase":"Wisdom is an ecology of psychotechnologies and cognitive styles that dynamically enhance relevance realization in inference, insight and intuition, internalization, understanding, and gnosis, transformation, and aspiration.","role":"summary"}]},{"id":"attention","canonicalName":"attention","aliases":[],"definition":"Not a direct action like walking but an optimization of other processes, tuning how you look, listen, or remember so they share a goal (Mole's 'cognitive unison'); central to how salience is modulated and how mindfulness reshapes the salience landscape.","sourcePassage":{"episode":8,"quote":"attention isn't a spotlight. It's a very complex optimisation process. It's really about tuning and getting between too tight and too loose and allow you to becoming intimately involved, conformed to, participating, 'inter-essay' with whatever you're paying attention to."},"depth":2,"cluster":"cognitive-science","introducedIn":8,"developedIn":[8,9,10,13],"appliedIn":[11,12,32,33],"prerequisites":["salience-landscape"],"relatedConcepts":["salience-landscape","mindfulness","insight","relevance-realization"],"contrastedWith":[],"associatedPeople":["christopher-mole"],"isFlagship":false,"notes":"Vervaeke rejects the spotlight metaphor, following Mole, attention is treated as an optimization-of-other-processes (cognitive unison), which is why mindfulness can train attention by reshaping how looking/listening/remembering co-ordinate.","subConcepts":[{"name":"attentional-scaling","description":"The dynamic adjustment of attention between fine-grained features and coarser gestalt patterns, a skill trainable through mindfulness.","keyPassages":[{"episode":9,"phrase":"Mindfulness is basically teaching us how to appropriate and train a flexibility of attentional scaling so that we can intervene effectively in how we are framing our problems","role":"definition"}],"passages":[]}],"commonConfusions":["Attention is not a spotlight that selects from a neutral field; it is a complex optimization process co-constituting what counts as relevant.","Training attention (e.g., through mindfulness) is not the same as training concentration; it is training the flexibility to shift between scales of relevance."],"keyPassages":[{"episode":8,"phrase":"attention isn't a spotlight. It's a very complex optimisation process.","role":"definition"},{"episode":9,"phrase":"Mindfulness is basically teaching us how to appropriate and train a flexibility of attentional scaling so that we can intervene effectively in how we are framing our problems and increase the chances of insight when insight is needed.","role":"application"},{"episode":10,"phrase":"Part of what's happening, part of what consciousness is doing, is it's creating a salience landscape for me.","role":"exemplar"}]},{"id":"bullshit","canonicalName":"bullshit","aliases":[],"definition":"Following Frankfurt, communication that operates not by lying (asserting falsehoods you know to be false) but by capturing attention through salience disconnected from any concern for truth, and, more crucially, the form of self-deception in which one's own attention is captured by what is super-salient rather than what is true.","sourcePassage":{"episode":4,"quote":"See bullshit, unlike lying, works by making you disinterested, unconcerned with whether or not what is being said is true. When somebody is bullshitting you, they're trying to get you to not find important or, \"central\", how true the claim is."},"depth":3,"cluster":"cognitive-science","introducedIn":1,"developedIn":[4,5,13],"appliedIn":[6,7,8,9,10,16,17,23,40,42,45],"prerequisites":["salience-landscape"],"relatedConcepts":["self-deception","salience-landscape","parasitic-processing","modal-confusion"],"contrastedWith":[],"associatedPeople":["leo-ferraro"],"isFlagship":false,"notes":"Vervaeke uses Frankfurt's term technically. Self-bullshitting is possible (whereas self-lying is not) because attention can be directed in a self-reinforcing loop that makes salience overrun understanding.","subConcepts":[],"commonConfusions":["Bullshit (in Frankfurt's and Vervaeke's sense) is not lying, the liar cares about truth and tries to hide it; the bullshitter is indifferent to truth and driven by salience or persuasion.","Bullshitting yourself through equivocation is not a deliberate strategy; it arises when salience overrides semantic vigilance."],"keyPassages":[{"episode":26,"phrase":"If you aren't clear about what this word means, how you're using this concept, you will be bullshitting yourself through equivocation.","role":"definition"},{"episode":26,"phrase":"We can't just integrate by equivocating - no integration through equivocation because that's just bullshitting.","role":"exemplar"}]},{"id":"conformity-theory","canonicalName":"conformity theory","aliases":["contact epistemology","Aristotle's conformity theory"],"definition":"Aristotle's theory of knowing in which to know something is to share the same idos (structural-functional organization) with it, a contact epistemology, not a representational one, by which the mind takes on the form of what it knows and is changed in its being thereby.","sourcePassage":{"episode":7,"quote":"So when I know some object or know some thing, my mind takes on the same structural functional organization as the thing such that if I could take that idos from my mind and actualize it in some potential, I could make an instance of the thing"},"depth":3,"cluster":"historical","introducedIn":7,"developedIn":[8,18,19,38,47],"appliedIn":[9,20,26,31,39,40],"prerequisites":["participatory-knowing"],"relatedConcepts":["participatory-knowing","transjective-relations","agent-arena-relationship","structural-functional-organization"],"contrastedWith":[],"associatedPeople":["aristotle","charles-taylor","dreyfus","eric-perl"],"isFlagship":false,"notes":"Vervaeke sees the conformity theory as undergoing a major revival in current cognitive science, Dreyfus, Merleau-Ponty, 4E approaches all return to contact epistemology.","subConcepts":[{"id":"knowing-as-contact-not-description","name":"Knowing as contact, not description","summary":"Aristotle's conformity theory treats knowing as an intimate contact with a thing, taking on the same structural-functional organization, rather than as standing apart and generating accurate propositions about it.","passages":[{"episode":7,"phrase":"So to know something is to be in contact with it, is to actually participate in the same form as the thing. I'm going to come back to this sense of participatory knowing."}]},{"id":"knowing-changes-being","name":"Knowing changes the knower's being","summary":"Because conformity theory requires taking on the same form as what is known, genuine knowing involves a change in the knower's very being, not just a change in beliefs, making knowing and becoming inseparable.","passages":[]}],"commonConfusions":["The conformity theory does not claim that knowledge is merely subjective or relativistic, conforming to the real pattern in the thing means getting at what is actually there, not just projecting a mental image onto it.","Aristotle's conformity theory is not the same as the modern correspondence theory of truth, correspondence asks whether propositions match facts, whereas conformity asks whether the mind takes on the same structural-functional organization as the thing itself.","Conformity theory is not a premodern curiosity, Vervaeke argues it is undergoing a revival in 4E cognitive science (Dreyfus, Merleau-Ponty, enactivism), which vindicates Aristotle's contact epistemology."],"keyPassages":[{"episode":7,"phrase":"when I know some object or know some thing, my mind takes on the same structural functional organization as the thing such that if I could take that idos from my mind and actualize it in some potential, I could make an instance of the thing","role":"definition"},{"episode":7,"phrase":"The conformity theory doesn't just change your beliefs it changes the very structure and functioning of your being.","role":"application"},{"episode":7,"phrase":"The conformity theory is a very different way of thinking about how we know things. So Charles Taylor, who I've mentioned before, Hubert Dreyfus and others, they talk about the Conformity Theory as a 'contact' epistemology.","role":"summary"}]},{"id":"the-conformity-vs-correspondence-distinction","canonicalName":"conformity versus correspondence","aliases":["conformity theory of knowing","correspondence theory of truth"],"definition":"The contrast between Aristotle's conformity theory of knowing (knowing as taking on the same idos as the thing) and the modern correspondence theory of truth (knowing as the matching of inner representation to outer fact), the modern collapse onto the latter cost us participatory knowing.","sourcePassage":{"episode":7,"quote":"Aristotle's theory of knowing there is no distinction - that is \\[that\\] we \\[would\\] typically have - between knowing and being."},"depth":4,"cluster":"historical","introducedIn":7,"developedIn":[21,22,26],"appliedIn":[18,19,38,40],"prerequisites":["conformity-theory"],"relatedConcepts":["conformity-theory","participatory-knowing","the-four-kinds-of-knowing"],"contrastedWith":[],"associatedPeople":["aristotle","descartes","heidegger","dreyfus"],"isFlagship":false,"notes":"Vervaeke treats the shift from conformity to correspondence as one of the central losses driving the meaning crisis.","subConcepts":[],"commonConfusions":["The shift from conformity to correspondence theory is not simply scientific progress, Vervaeke argues it is a loss, because the correspondence theory strips out participatory and perspectival knowing, leaving only propositional knowing.","The correspondence theory is not wrong about what it does describe, it correctly captures one kind of knowing (propositional), but treating it as the only kind of knowing is what drives the meaning crisis.","Recovering conformity theory does not mean abandoning science, Vervaeke argues 4E cognitive science is already vindicating contact epistemology within a rigorous scientific framework."],"keyPassages":[{"episode":7,"phrase":"Aristotle's theory of knowing there is no distinction - that is that we would typically have - between knowing and being.","role":"definition"},{"episode":7,"phrase":"Here's the modern view (cup at distance): I'm over here describing it; it's over there, independent. I'm over here describing it. Here's Aristotle's view (picks cup up): I'm actually changing my structure.","role":"exemplar"},{"episode":7,"phrase":"The conformity theory is a very different way of thinking about how we know things. So Charles Taylor, who I've mentioned before, Hubert Dreyfus and others, they talk about the Conformity Theory as a 'contact' epistemology.","role":"application"},{"episode":22,"phrase":"And so Pascal is pointing out that what has been lost in the scientific revolution is all these other kinds of knowing and being, and these are the kinds of knowing and being that he found present in the transformative experience that he had.","role":"qualification"}]},{"id":"consciousness","canonicalName":"consciousness","aliases":[],"definition":"The dynamical machinery that coordinates attention and awareness to optimize the realization of relevant information from a vast informational space, generating salience landscape, presence landscape, and depth landscape, and whose alteration is essential to insight, transformation, and the mystical.","sourcePassage":{"episode":10,"quote":"The core function of consciousness seems to be to help you realize, become aware of, actualize, put into action, 'Relevance': relevant information."},"depth":3,"cluster":"cognitive-science","introducedIn":10,"developedIn":[11,12,28,32],"appliedIn":[8,9,13,31,33,36,40,45],"prerequisites":[],"relatedConcepts":["salience-landscape","relevance-realization","altered-states-of-consciousness","higher-states-of-consciousness","attention"],"contrastedWith":[],"associatedPeople":[],"isFlagship":false,"notes":"Vervaeke draws on Global Workspace Theory (Baars), Integrated Information Theory (Tononi), and the frame-problem literature to argue that consciousness's function is relevance realization, not the production of propositional content.","subConcepts":[{"name":"relevance-realization-function","description":"The primary cognitive function of consciousness is to enact relevance realization, making relevant information available for adaptive action.","keyPassages":[{"episode":10,"phrase":"The core function of consciousness seems to be to help you realize, become aware of, actualize, put into action, 'Relevance': relevant information.","role":"definition"}],"passages":[]},{"name":"ontonormativity","description":"The normative demand built into conscious experience: the sense that reality is placing a call on the agent to orient correctly, to improve one's grip on what is real.","keyPassages":[{"episode":10,"phrase":"I call this the problem of the 'Ontonormativity.' Remember that 'ontology' has to do with the structure of reality. Normative is when things are placing a demand on you to be better, to improve.","role":"definition"}],"passages":[]},{"name":"working-memory-as-relevance-filter","description":"Working memory functions as a relevance filter, screening off irrelevant information and allowing deeper processing of what matters, and is correlated with general intelligence.","keyPassages":[{"episode":29,"phrase":"the job of working memory is to be a relevance filter and to screen off irrelevant information and allow in to processing, deeper processing, more relevant information","role":"exemplar"}],"passages":[]}],"commonConfusions":["Consciousness is not merely the passive theatre in which mental content plays out, its core function is the active enactment of relevance realization.","Ontonormativity is not a metaphysical claim about objective values; it describes the phenomenology of consciousness placing normative demands on cognition.","The hard problem of consciousness (why there is phenomenal experience) is distinct from the functional question (what consciousness does) that Vervaeke primarily addresses."],"keyPassages":[{"episode":10,"phrase":"The core function of consciousness seems to be to help you realize, become aware of, actualize, put into action, 'Relevance': relevant information.","role":"definition"},{"episode":10,"phrase":"Part of what's happening, part of what consciousness is doing, is it's creating a salience landscape for me.","role":"exemplar"},{"episode":10,"phrase":"I call this the problem of the 'Ontonormativity.' Remember that 'ontology' has to do with the structure of reality. Normative is when things are placing a demand on you to be better, to improve.","role":"definition"},{"episode":29,"phrase":"consciousness seems to be bound up with Relevance Realisation","role":"summary"},{"episode":29,"phrase":"the job of working memory is to be a relevance filter and to screen off irrelevant information and allow in to processing, deeper processing, more relevant information","role":"application"}]},{"id":"distributed-cognition","canonicalName":"distributed cognition","aliases":[],"definition":"The networked nature of human cognition in which problem-solving and meaning-making are accomplished not in isolated individuals but in groups of brains linked by psycho-technologies (language, ritual, literacy, institutions), making any wisdom tradition fundamentally communal.","sourcePassage":{"episode":1,"quote":"Way before the Internet networked computers together, culture networked brains together in order to provide some of our most powerful problem solving abilities."},"depth":2,"cluster":"cognitive-science","introducedIn":1,"developedIn":[4,36,39,46],"appliedIn":[2,3,11,13,14,15,38,40,45],"prerequisites":[],"relatedConcepts":["psycho-technology","ecology-of-practices","religion-that-is-not-a-religion","philia-sophia"],"contrastedWith":[],"associatedPeople":["andy-clark"],"isFlagship":false,"notes":"Vervaeke uses distributed cognition to argue against modern autodidactic spirituality and for the cooperative network of communities of practice in his proposed religion that is not a religion.","subConcepts":[],"commonConfusions":["Distributed cognition is not merely outsourcing memory to notebooks, it refers to the genuine extension of cognitive processing into tools, bodies, and social systems.","Distributed cognition does not eliminate individual cognitive responsibility; it changes the unit of cognitive analysis from brain to person-plus-environment system."],"keyPassages":[{"episode":38,"phrase":"our cognition is not in our head, but it's extended through our interactions, through the world, through our psychotechnologies, through distributed cognition","role":"definition"},{"episode":38,"phrase":"culture is about both fitting people to an environment and fitting the environment to the people in this ongoing fashion","role":"exemplar"},{"episode":31,"phrase":"The world and the organism are co-creating co-determining co-evolving the fittedness.","role":"summary"},{"episode":29,"phrase":"the perspectival ultimately depends on the participatory","role":"qualification"}]},{"id":"domicide","canonicalName":"domicide","aliases":["cultural domicide","loss of home"],"definition":"Porteous and Smith's term, picked up by Brian Walsh and Vervaeke, for the destruction of home, not merely of one's house but of the connectedness to place, culture, history, language, and community in which one's identity is constituted; central to the Hellenistic crisis and to modernity.","sourcePassage":{"episode":14,"quote":"Domicide is the destruction of home. Now there's two ways in which Domicide can occur. One, of course, is physical destruction of your house, and that's important, but there's also Cultural Domicide in which you have a house, you have a dwelling, but it is not very much your home."},"depth":3,"cluster":"historical","introducedIn":14,"developedIn":[15,16,17,18,25,33,36,46],"appliedIn":[19,20,23,26],"prerequisites":[],"relatedConcepts":["the-meaning-crisis","the-sacred","absurdity","agent-arena-relationship"],"contrastedWith":[],"associatedPeople":["porteous","brian-walsh"],"isFlagship":false,"notes":"Domicide is one of Vervaeke's key bridges between Hellenistic meaning crisis (Epicureans, Stoics, Cynics) and our own situation.","subConcepts":[{"id":"hellenistic-domicide","name":"Hellenistic domicide and age of anxiety","summary":"The Hellenistic period created cultural domicide on a massive scale, people were uprooted from polis, language group, shared religion, and history by Alexander's conquests, producing the age of anxiety that generated Stoicism, Epicureanism, and early Christianity.","passages":[{"episode":14,"phrase":"You are now probably thousands of miles away from the seat of government. You do not participate in that government, nor do you know, personally, most of the people or any of the people in it."}]},{"id":"physical-vs-cultural-domicide","name":"Physical versus cultural domicide","summary":"Cultural domicide, having a house but not a home, is the deeper form: the loss of connectedness to place, culture, history, language, and community that constitutes identity, even while the physical dwelling remains intact.","passages":[{"episode":14,"phrase":"Domicide is the destruction of home. Now there's two ways in which Domicide can occur. One, of course, is physical destruction of your house, and that's important, but there's also Cultural Domicide in which you have a house, you have a dwelling, but it is not very much your home."}]}],"commonConfusions":["Domicide is not simply homesickness or nostalgia, it is the systematic destruction of the agent-arena relationship at the level of culture and community, making individual meaning systems unworkable.","Domicide is not confined to the Hellenistic period, Vervaeke explicitly uses it as a bridge concept between ancient and modern meaning crises, arguing that our current situation involves analogous cultural un-homing.","The loss of home in domicide is not primarily about geography, it is the loss of the relational, cultural, and historical embeddedness in which identity is constituted and meaning-making is made possible."],"keyPassages":[{"episode":14,"phrase":"Domicide is the destruction of home. Now there's two ways in which Domicide can occur. One, of course, is physical destruction of your house, and that's important, but there's also Cultural Domicide in which you have a house, you have a dwelling, but it is not very much your home.","role":"definition"},{"episode":14,"phrase":"People are experiencing this radical sense of Domicide. They don't have deep connections to themselves, to each other, to their environment, to their history, to their cultural surroundings.","role":"exemplar"},{"episode":14,"phrase":"notice how often we will use the language of loss of home to describe our current situation where we often talk about how we now feel un-homed in the cosmos.","role":"application"}]},{"id":"dukkha","canonicalName":"dukkha","aliases":["suffering (Buddhist)"],"definition":"Not pain or distress but the Buddhist term for the self-destructive disjointedness of an existence threatened by loss of agency, the wheel off-axle that destroys itself as it turns, the perennial vulnerability of agency to entrapment by its own adaptive machinery.","sourcePassage":{"episode":13,"quote":"What does Dukkha mean? Well the etymology is: imagine you have a wheel, and it's off-center on its axis, so the axle is not properly going through the center of the wheel and as the wheel is turning it's destroying itself."},"depth":3,"cluster":"historical","introducedIn":13,"developedIn":[36,39],"appliedIn":[8,14,38],"prerequisites":[],"relatedConcepts":["parasitic-processing","reciprocal-narrowing","the-eightfold-path","modal-confusion"],"contrastedWith":["the-eightfold-path"],"associatedPeople":["siddhartha-gautama","stephen-batchelor"],"isFlagship":false,"notes":"Vervaeke insists dukkha is not 'all is pain' (the Western mistranslation) but 'all life is threatened with loss of agency.'","subConcepts":[],"commonConfusions":["Dukkha does not mean 'all is pain' or 'life is suffering', Vervaeke insists this is a Western mistranslation; the actual meaning is that all life is threatened with loss of agency, self-destructive disjointedness, and entrapment.","The Buddha's claim is not pessimistic, it is a provocation to awareness: realize that all your life is threatened with dukkha so you take the eightfold path seriously, not a claim that nothing is enjoyable.","Dukkha is not caused simply by desire in the sense of wanting things, it is caused by a pattern of attachment analogous to addiction: a parasitic processing and reciprocal narrowing that eliminates alternatives."],"keyPassages":[{"episode":13,"phrase":"What does Dukkha mean? Well the etymology is: imagine you have a wheel, and it's off-center on its axis, so the axle is not properly going through the center of the wheel and as the wheel is turning it's destroying itself.","role":"definition"},{"episode":13,"phrase":"all of your life is threatened, very really threatened, existentially threatened, by a capacity for self-destructive behavior. Self-deceptive, self-destructive behavior.","role":"exemplar"},{"episode":13,"phrase":"To 'suffer' means to undergo. It means to lose Agency. So you can actually suffer Joy.","role":"qualification"},{"episode":13,"phrase":"The Buddha is not saying everything's painful. That's ridiculous. Because if everything was painful nothing would be painful.","role":"summary"}]},{"id":"ecology-of-practices","canonicalName":"ecology of practices","aliases":["ecology of psycho-technologies","ecology of practices and psycho-technologies"],"definition":"A mutually supporting set of psycho-technologies, meditation, contemplation, dialogue, ritual, Lectio Divina, martial practice, that together form a counteractive dynamical system against parasitic processing and reciprocal narrowing, and that requires sapiential community to sustain.","sourcePassage":{"episode":36,"quote":"cultures – and individuals, communities, at multiple scales – what people have developed is they have developed sets of psycho-technologies"},"depth":3,"cluster":"practical","introducedIn":36,"developedIn":[37,38,45,46],"appliedIn":[13,14,39,43,44,50],"prerequisites":["psycho-technology"],"relatedConcepts":["psycho-technology","the-eightfold-path","religion-that-is-not-a-religion"],"contrastedWith":[],"associatedPeople":[],"isFlagship":false,"notes":"Vervaeke argues against modern autodidactic spirituality precisely because these practices require an ecology, they fail or become dangerous in isolation.","subConcepts":[{"id":"counteractive-dynamical-system","name":"Counteractive dynamical system","summary":"The functional target of any ecology of practices: a set of mutually reinforcing psycho-technologies that, once internalized, takes on a self-rolling life of its own and can resist the self-organizing force of parasitic processing.","passages":[{"episode":37,"phrase":"what you want to do is you want to cultivate a counteractive dynamical system. See, Parasitic Processing is a very complex dynamical system, and if you try and do one shot interventions, it just reconfigures itself."}]},{"id":"complementary-practice-relationships","name":"Complementary and checks-and-balances relationships","summary":"An ecology of practices is not an arbitrary collection but a set of practices whose strengths and weaknesses mutually correct one another, producing reliable self-complexification.","passages":[{"episode":39,"phrase":"you should be setting up psychotechnologies, sets of practices and cognitive styles that have complimentary relationships to each other, that have sets of corresponding checks and balances, strengths, and weaknesses."}]},{"id":"sapiential-community-requirement","name":"Sapiential community as necessary condition","summary":"No ecology of practices can be safely sustained in isolation; it requires a community that provides corrective feedback and prevents dangerous autodidactic spirituality.","passages":[{"episode":37,"phrase":"people are forced, as I said, to cobble together in a dangerously autodidactic fashion, their own personal responses to perennial problems without traditions, guidance, communities, well-worked out sets of practices, well-vetted, well-developed."}]}],"commonConfusions":["An ecology of practices is not simply a personal routine or habit stack; it must be a dynamical system that functions collectively across levels of cognition, character, and consciousness.","Ecology of practices does not mean any combination of self-chosen techniques; Vervaeke insists the practices must have complementary relationships and mutual checks, not just coexist.","The ecology is not optional insurance on top of normal life; it is the primary structural response to perennial problems that are themselves dynamical and self-reinforcing."],"keyPassages":[{"episode":37,"phrase":"what you want to do is you want to cultivate a counteractive dynamical system. See, Parasitic Processing is a very complex dynamical system, and if you try and do one shot interventions, it just reconfigures itself.","role":"exemplar"},{"episode":37,"phrase":"what you're getting there is a strong recommendation for looking at this as cultivating an ecology of practices, getting sets of practices, sets of psycho-technologies that have complementary relationships to each other, organizing them together.","role":"application"},{"episode":36,"phrase":"The historical factors lead to the undermining of the whole ecology of practices and psycho-technologies and cognitive cultural grammar that people have created in order to respond to the perennial problems.","role":"qualification"},{"episode":38,"phrase":"having a ecology of psychotechnologies for addressing the perennial problems is necessary, but, of course, not sufficient for responding to the meaning crisis.","role":"qualification"}]},{"id":"eros","canonicalName":"eros","aliases":["erotic love","consumptive love"],"definition":"The love of becoming one with something, being one with nature, with a beloved, even with a cookie consumed, the love satisfied through consummation and unification.","sourcePassage":{"episode":15,"quote":"Eros is the love that seeks to be one with something."},"depth":2,"cluster":"normative","introducedIn":15,"developedIn":[16,43],"appliedIn":[17,22,39],"prerequisites":[],"relatedConcepts":["agape","philia"],"contrastedWith":["agape","philia"],"associatedPeople":["plato","socrates"],"isFlagship":true,"notes":"Distinct from the modern reduction to sexual love. Socrates's ta erotika is about knowing how to love well, what to care about.","subConcepts":[{"id":"eros-as-consumptive-unification","name":"Eros as consumptive unification","summary":"Eros seeks to become one with something, from consuming food to sexual union, and is satisfied through consummation.","passages":[{"episode":15,"phrase":"Eros is the love that seeks to be one with something."}]},{"id":"ta-erotika-socratic","name":"Ta erotika, Socrates's craft of loving rightly","summary":"Socrates claimed mastery of 'ta erotika', not just sexual love but knowing how to care and what to care about, making eros a form of wisdom when practised with discernment.","passages":[{"episode":15,"phrase":"Socrates new/taught erotica, which wasn't just sex. Socrates knew what to care about."}]}],"commonConfusions":["Eros in Vervaeke's usage is not limited to sexual love, it includes any desire for union or consummation, from eating a cookie to becoming one with nature.","Eros is not the highest Greek love, philia and agape operate on different axes, and Vervaeke contrasts all three to show their distinct logics.","Mastery of eros (ta erotika, as Socrates practised it) is about knowing what to care about, it is a form of wisdom, not mere passion."],"keyPassages":[{"episode":15,"phrase":"Eros is the love that seeks to be one with something.","role":"definition"},{"episode":15,"phrase":"So this is the love that is satisfied through consummation. Phylia. This is the love that seeks cooperation. This is the love in which we experienced reciprocity.","role":"summary"},{"episode":16,"phrase":"Eros is consumptive - making one with -, Phylia is cooperation - we work together.","role":"summary"}]},{"id":"exaptation","canonicalName":"exaptation","aliases":["cognitive exaptation"],"definition":"Michael Anderson's extension of Gould's biological concept: the cognitive process by which a brain mechanism evolved for one purpose is reused for another, like the tongue exapted for speech, or self-machinery exapted onto the world in mystical experience.","sourcePassage":{"episode":1,"quote":"Now originally this is an idea from biology, but the [work of Michael Anderson](https://www.dropbox.com/s/gbzohaikvbqq5d1/69anderson_synthese_2007.pdf?dl=0) has brought it directly into understanding how the brain operates; how cognition operates."},"depth":2,"cluster":"cognitive-science","introducedIn":1,"developedIn":[2,12],"appliedIn":[3,5,17,23,36,39],"prerequisites":[],"relatedConcepts":["psycho-technology"],"contrastedWith":[],"associatedPeople":["michael-anderson"],"isFlagship":false,"notes":"Exaptation grounds Vervaeke's argument for how shamanic practice could enhance cognition without biological change."},{"id":"existential-entrapment","canonicalName":"existential entrapment","aliases":["existential trap","stuck and stupefied"],"definition":"The condition of being simultaneously existentially stuck (unable to engage sensibility transcendence into a new worldview) and existentially stupefied (unable to reason one's way through a transformative decision), for which gnosis, via ritual serious play and enactive analogy, is the response.","sourcePassage":{"episode":17,"quote":"They're stuck and they're stupefied. And when we're stuck and we're stupefied when we're stuck, we can't imagine how to make an alternative worldview significant. How to make it viable when we're stupefied. We can't imagine the alternative."},"depth":4,"cluster":"cognitive-science","introducedIn":17,"developedIn":[18,38,39,46],"appliedIn":[16,19,22,23,36,37,47,48],"prerequisites":[],"relatedConcepts":["gnosis","transformative-experience","ritual","the-perennial-problems"],"contrastedWith":["gnosis","anagoge"],"associatedPeople":["jung","la-paul"],"isFlagship":false,"notes":"Vervaeke combines Frankfurt's notion of the unthinkable, Paul's existential ignorance, and Jung's clinical phenomenon of stuckness into one diagnostic category.","subConcepts":[],"commonConfusions":["Existential entrapment is not ordinary indecision or laziness; it is a cognitive-existential paralysis in which the agent cannot imaginatively inhabit an alternative worldview.","Overcoming existential entrapment requires gnosis (participatory transformation), not propositional argument, being told a better worldview exists does not liberate a trapped agent."],"keyPassages":[{"episode":17,"phrase":"They're stuck and they're stupefied. And when we're stuck and we're stupefied when we're stuck, we can't imagine how to make an alternative worldview significant.","role":"definition"},{"episode":17,"phrase":"Gnosis is to have a set of psychotechnologies that create a ritual context like Jeepform, like martial arts, like therapy that allows us to overcome being existentially stuck, existentially stupefied.","role":"application"},{"episode":38,"phrase":"we can respond to existential entrapment by the cultivation of gnosis, which can be empowered by a core capacity for realizing higher states of consciousness","role":"application"},{"episode":17,"phrase":"It's not a reframing of a particular problem. It's a transformation of the whole framing process: Both ends.","role":"definition"}]},{"id":"existential-mode","canonicalName":"existential mode","aliases":["mode of being","modal existence"],"definition":"The participatory way one is assuming an identity and assigning identity to the world in a co-defining process, the meta-meaning relation in which one's projects of meaning take their significance, exemplified in Fromm's having-mode versus being-mode.","sourcePassage":{"episode":7,"quote":"This process by which you are co-identifying agency and arena so that they fit together and make sense of each other and you get a coherent and functioning world view... That's your existential mode."},"depth":3,"cluster":"cognitive-science","introducedIn":7,"developedIn":[8,13,17],"appliedIn":[9,10,14,15,16,19,22,38,46],"prerequisites":[],"relatedConcepts":["having-mode-being-mode","worldview-attunement","agent-arena-relationship","modal-confusion"],"contrastedWith":[],"associatedPeople":["fromm","buber","geertz"],"isFlagship":false,"notes":"Distinct from semantic meaning; this is modal/existential meaning. Modal confusion is conflating having- and being-mode.","subConcepts":[],"commonConfusions":["Existential mode is not a belief or theory about oneself; it is a pre-reflective orientation enacted in the agent-arena coupling.","Switching existential modes is not a mere change of attitude, it requires transforming the participatory knowing that grounds the agent's world."],"keyPassages":[{"episode":7,"phrase":"This process by which you are co-identifying agency and arena so that they fit together and make sense of each other and you get a coherent and functioning world view... That's your existential mode.","role":"definition"},{"episode":7,"phrase":"Fromm's point is we get mixed up. We try to satisfy our being needs within the having mode. We suffer from 'Modal Confusion'.","role":"exemplar"},{"episode":7,"phrase":"what you have, when you have a world view, is you've got this Agent and Arena coupling.","role":"application"},{"episode":38,"phrase":"We can address modal confusion by the cultivation of Sati.","role":"application"},{"episode":31,"phrase":"The world and the organism are co-creating co-determining co-evolving the fittedness.","role":"qualification"}]},{"id":"flow","canonicalName":"flow","aliases":["flow state","flow experience"],"definition":"Csikszentmihalyi's optimal experience in which skills are stretched to meet the slightly-exceeding demands of a task, producing spontaneous, effortful-yet-effortless engagement, altered sense of time and self, and an insight cascade with enhanced implicit learning.","sourcePassage":{"episode":2,"quote":"the flow state is one in which the demands of the situation just slightly go beyond your skill abilities."},"depth":2,"cluster":"cognitive-science","introducedIn":2,"developedIn":[9,28,32,33],"appliedIn":[8,10,11,12,30,36,38,40,44,45],"prerequisites":[],"relatedConcepts":["insight","implicit-learning","altered-states-of-consciousness","higher-states-of-consciousness","optimal-grip"],"contrastedWith":[],"associatedPeople":["csikszentmihalyi"],"isFlagship":true,"notes":"Flow is universal across cultures. Vervaeke argues it is what shamans cultivated, and that the more often one flows, the more meaningful one rates one's life.","subConcepts":[{"name":"skills-demands-matching","description":"The environmental condition for flow: situational demands slightly exceed current skill level, requiring full engagement without overwhelming.","keyPassages":[{"episode":2,"phrase":"the flow state is one in which the demands of the situation just slightly go beyond your skill abilities … If my skills exceed the demands, I fall into boredom. If my demands exceed the skills, I fall into anxiety.","role":"definition"}],"passages":[]},{"name":"implicit-learning-enhancement","description":"Flow's tight-coupled, error-sensitive feedback environment trains implicit learning to track causal rather than merely correlational patterns.","keyPassages":[{"episode":2,"phrase":"those three criteria that will turn your intuition into good implicit learning are exactly the conditions for flow. Clear information. Tightly coupled feedback. And error matters.","role":"definition"}],"passages":[]},{"name":"reduced-self-monitoring","description":"In flow, autobiographical self-consciousness and image-management recede, freeing cognitive resources for the task.","keyPassages":[{"episode":2,"phrase":"when you're in the flow state, a kind of self-consciousness disappears … It's constantly doing our autobiography … All of that nattering … and that … can get out of hand … Bu
